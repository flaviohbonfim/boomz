<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoomZ!</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #5a645c 0%, #252c28 48%, #101412 100%);
            font-family: "Trebuchet MS", "Arial Narrow", sans-serif;
            padding: 24px;
        }

        @media (pointer: coarse) {
            body {
                padding: 0;
                align-items: stretch;
                justify-content: stretch;
                overflow: hidden;
                height: 100dvh;
            }
        }

        canvas {
            image-rendering: pixelated;
            display: block;
        }

        /* ════════════════════════════════
           CONSOLE FRAME
        ════════════════════════════════ */
        #console-frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(172deg, #2e3b34 0%, #1c2720 32%, #101710 100%);
            border-radius: 22px 22px 56px 56px;
            padding: 18px 22px 0 22px;
            box-shadow:
                0 0 0 1px #07100d,
                0 0 0 3px #36443c,
                0 0 0 5px #111a15,
                0 60px 140px rgba(0, 0, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 2px 8px rgba(255, 255, 255, 0.02);
        }

        @media (pointer: coarse) {
            #console-frame {
                width: 100%;
                height: 100dvh;
                border-radius: 0;
                padding: 10px 12px 0 12px;
            }
        }

        /* ── Console header: speaker grilles + logo ── */
        #console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding-bottom: 14px;
        }

        .speaker-grille {
            display: grid;
            grid-template-columns: repeat(5, 5px);
            grid-template-rows: repeat(2, 5px);
            gap: 3px;
        }

        .speaker-grille span {
            display: block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #111a15;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.9), 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        #console-logo-text {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #cf9a3c;
            text-shadow: 0 0 12px rgba(207, 154, 60, 0.4);
            text-transform: uppercase;
        }

        /* ── Screen bezel ── */
        #screen-bezel {
            background: #060e0b;
            border-radius: 8px;
            padding: 12px;
            box-shadow:
                inset 0 4px 14px rgba(0, 0, 0, 0.98),
                inset 0 0 0 1px rgba(0, 0, 0, 0.65),
                0 0 0 1px #1c2820;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (pointer: coarse) {
            #screen-bezel {
                width: 100%;
                flex: 1;
                padding: 8px;
                min-height: 0;
            }
        }

        /* ── Virtual controls (hidden on desktop) ── */
        #virtual-controls { display: none; }

        @media (pointer: coarse) {
            #virtual-controls {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                padding: 12px 20px;
                min-height: 155px;
                flex-shrink: 0;
                touch-action: none;
            }
        }

        /* ── D-pad ── */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 52px);
            grid-template-rows: repeat(3, 52px);
            gap: 4px;
        }

        .dpad-btn {
            background: rgba(63, 71, 66, 0.85);
            border: 2px solid #5a645c;
            border-radius: 8px;
            color: #c8d4cc;
            font-size: 20px;
            cursor: pointer;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            padding: 0;
        }

        .dpad-btn:active, .dpad-btn.pressed {
            background: rgba(207, 154, 60, 0.5);
            border-color: #cf9a3c;
        }

        .dpad-center {
            background: rgba(20, 28, 22, 0.7);
            border-radius: 50%;
        }

        /* ── Action buttons ── */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .action-btn {
            background: rgba(180, 40, 40, 0.85);
            border: 2px solid #c04040;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            cursor: pointer;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .btn-start {
            background: rgba(40, 80, 160, 0.85);
            border-color: #4070c0;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-radius: 14px;
            width: 68px;
            height: 34px;
        }

        .action-btn:active { filter: brightness(1.4); }

        /* ── Console footer strip ── */
        #console-footer {
            width: 100%;
            height: 22px;
            margin-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.035);
            border-radius: 0 0 56px 56px;
            background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.35));
            flex-shrink: 0;
        }

        @media (pointer: coarse) {
            #console-footer {
                height: 14px;
                margin-top: 0;
                border-radius: 0;
            }
        }
    </style>
</head>

            <div class="speaker-grille">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>

            <span id="console-logo-text">BoomZ!</span>
            <div class="speaker-grille">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

            <!-- canvas injected here after kaboom() -->
        </div>

                <div></div>
                <button class="dpad-btn" id="btn-up">▲</button>
                <div></div>

    <script type="module">
import kaboom from "https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs";

// ── Mobile detection & scale ──
const isMobile = ('ontouchstart' in window) || window.matchMedia('(pointer: coarse)').matches;
const vKeys = { left: false, right: false, up: false, down: false };
let virtualBombPressed = false;
let virtualPausePressed = false;
let gameScale = 2.5;
if (isMobile) {
    // vertical: frame-pad(10) + header(44) + header-pb(14) + bezel-pad(16) + controls(155) + footer(14)
    const VERTICAL_OVERHEAD = 253;
    // horizontal: frame-pad(24) + bezel-pad(16)
    const HORIZONTAL_OVERHEAD = 40;
    const scaleW = (window.innerWidth - HORIZONTAL_OVERHEAD) / 304;
    const scaleH = (window.innerHeight - VERTICAL_OVERHEAD) / 280;
    gameScale = Math.min(scaleW, scaleH, 2.5);
}

if (location.protocol === "file:") {
    document.body.innerHTML = `
        <main style="max-width:720px;padding:32px 28px;border:4px solid #3f4742;box-shadow:0 24px 60px rgba(0,0,0,.65),0 0 40px rgba(207,154,60,.18);background:linear-gradient(180deg,#232a26 0%,#141816 100%);color:#f0d59c;line-height:1.5;">
            <h1 style="font-size:32px;margin-bottom:12px;">BoomZ!</h1>
            <p style="margin-bottom:12px;color:#c9d0cb;">Agora os sprites estao em arquivos separados dentro de <code>assets/</code>. Navegadores bloqueiam esse carregamento quando o jogo e aberto por <code>file://</code>.</p>
            <p style="margin-bottom:12px;color:#c9d0cb;">Para rodar corretamente:</p>
            <ol style="padding-left:22px;margin-bottom:14px;color:#f0d59c;">
                <li>Execute <code>start-local-server.bat</code></li>
                <li>Abra <code>http://localhost:8080</code></li>
            </ol>
            <p style="color:#95a19a;">Se preferir, voce tambem pode usar qualquer servidor HTTP local.</p>
        </main>
    `;
    await new Promise(() => {});
}

kaboom({
    width: 304,
    height: 280,
    scale: gameScale,
    crisp: true,
    background: [16, 20, 18],
});

// Move canvas into the screen bezel
document.getElementById('screen-bezel').appendChild(document.querySelector('canvas'));

// ── Virtual controls wiring (flags only — no synthetic keyboard events) ──
{
    const dpadDirs = [
        { id: 'btn-up',    dir: 'up'    },
        { id: 'btn-down',  dir: 'down'  },
        { id: 'btn-left',  dir: 'left'  },
        { id: 'btn-right', dir: 'right' },
    ];
    for (const { id, dir } of dpadDirs) {
        const el = document.getElementById(id);
        el.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            el.setPointerCapture(e.pointerId);
            vKeys[dir] = true;
        });
        const release = () => { vKeys[dir] = false; };
        el.addEventListener('pointerup',     release);
        el.addEventListener('pointercancel', release);
        el.addEventListener('pointerleave',  release);
    }

    // X = bomb (game) / confirm (menu) — both handled via virtualBombPressed flag
    document.getElementById('btn-x').addEventListener('pointerdown', (e) => {
        e.preventDefault();
        virtualBombPressed = true;
    });

    // START = pause (game) / ignored on menu — handled via virtualPausePressed flag
    document.getElementById('btn-start').addEventListener('pointerdown', (e) => {
        e.preventDefault();
        virtualPausePressed = true;
    });

    // Prevent page scroll while touching the controls
    document.getElementById('virtual-controls').addEventListener('touchmove', (e) => {
        e.preventDefault();
    }, { passive: false });
}

const TILE_SIZE = 16;
const MAP_WIDTH = 19;
const MAP_HEIGHT = 15;
const HUD_HEIGHT = 40;
const MAP_OFFSET_Y = HUD_HEIGHT;
const START_LIVES = 3;
const START_BOMBS = 1;
const START_FIRE = 2;
const ACTOR_VISUAL_OFFSET = vec2(0, -6);
const PLAYER_SHEET_PATH = "assets/characters/player-sheet-refined-v2.svg";
const ZOMBIE_SHEET_PATH = "assets/characters/zombie-sheet-refined-v2.svg";
const BOMB_SHEET_PATH = "assets/items/bomb-sheet-refined-v2.svg";
const EXPLOSION_SHEET_PATH = "assets/items/explosion-sheet-refined-v2.svg";
const GAME_TITLE = "BOOMZ!";
const GAME_KICKER = "OUTBREAK RESPONSE";
const GAME_TAGLINE = "Varra as ruas, exploda barricadas e limpe a horda.";

const SFX_DEFAULTS = {
    uiMove: { volume: 0.35 },
    uiConfirm: { volume: 0.4 },
    uiBack: { volume: 0.3 },
    pauseToggle: { volume: 0.3 },
    bombPlace: { volume: 0.42 },
    bombAlert: { volume: 0.32 },
    explosionSfx: { volume: 0.6 },
    playerHitSfx: { volume: 0.45 },
    zombieDown: { volume: 0.28 },
    pickupSfx: { volume: 0.4 },
    victorySfx: { volume: 0.45 },
    failureSfx: { volume: 0.42 },
};

let audioMuted = false;
let audioPrimed = false;
let currentMusicHandle = null;
let currentAmbienceHandle = null;
let currentSceneAudio = { music: null, ambience: null };
const audioStatusBindings = [];

const SOLID = 1;
const DESTRUCTIBLE = 2;
const EMPTY = 0;
const POWER_BOMB = "bomb";
const POWER_FIRE = "fire";

const PLAYER_ANIMS = {
    "idle-down": { from: 0, to: 1, speed: 4, loop: true },
    "walk-down": { from: 6, to: 9, speed: 10, loop: true },
    "idle-side": { from: 12, to: 12, speed: 1, loop: true },
    "walk-side": { from: 18, to: 21, speed: 10, loop: true },
    "idle-up": { from: 24, to: 25, speed: 4, loop: true },
    "walk-up": { from: 30, to: 33, speed: 10, loop: true },
    hurt: { from: 36, to: 39, speed: 12, loop: false },
    death: { from: 42, to: 47, speed: 8, loop: false },
};

const ZOMBIE_ANIMS = {
    "idle-down": { from: 0, to: 1, speed: 3, loop: true },
    "walk-down": { from: 4, to: 7, speed: 8, loop: true },
    "idle-side": { from: 8, to: 9, speed: 3, loop: true },
    "walk-side": { from: 12, to: 15, speed: 8, loop: true },
    "idle-up": { from: 16, to: 17, speed: 3, loop: true },
    "walk-up": { from: 20, to: 23, speed: 8, loop: true },
    death: { from: 24, to: 27, speed: 8, loop: false },
};

const BOMB_ANIMS = {
    fuse: { from: 0, to: 3, speed: 8, loop: true },
    alert: { from: 4, to: 5, speed: 12, loop: true },
};

const EXPLOSION_ANIMS = {
    center: { from: 0, to: 2, speed: 14, loop: false },
    "horizontal-mid": { from: 3, to: 5, speed: 14, loop: false },
    "vertical-mid": { from: 6, to: 8, speed: 14, loop: false },
    "horizontal-end-right": { from: 9, to: 11, speed: 14, loop: false },
    "vertical-end-down": { from: 12, to: 14, speed: 14, loop: false },
};

let gameMap = [];

function worldPos(gx, gy) {
    return vec2(gx * TILE_SIZE + TILE_SIZE / 2, gy * TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y);
}

function gridFromPos(pos) {
    return {
        x: Math.round((pos.x - TILE_SIZE / 2) / TILE_SIZE),
        y: Math.round((pos.y - MAP_OFFSET_Y - TILE_SIZE / 2) / TILE_SIZE),
    };
}

function inBounds(gx, gy) {
    return gx >= 0 && gx < MAP_WIDTH && gy >= 0 && gy < MAP_HEIGHT;
}

function isEdgeCorridor(gx, gy) {
    return gx === 1 || gy === 1 || gx === MAP_WIDTH - 2 || gy === MAP_HEIGHT - 2;
}

function actorDepth(posY) {
    return 20 + (posY - MAP_OFFSET_Y) / TILE_SIZE;
}

function stopAudioHandle(handle) {
    if (!handle) return;
    try {
        handle.stop();
    } catch {}
}

function cleanupAudioBindings() {
    for (let i = audioStatusBindings.length - 1; i >= 0; i--) {
        const binding = audioStatusBindings[i];
        if (!binding.label.exists || !binding.label.exists()) {
            audioStatusBindings.splice(i, 1);
        }
    }
}

function updateAudioLabels() {
    cleanupAudioBindings();
    audioStatusBindings.forEach((binding) => {
        binding.label.text = binding.formatter(audioMuted);
        if (binding.colorize) binding.colorize(binding.label, audioMuted);
    });
}

function bindAudioLabel(label, formatter, colorize) {
    audioStatusBindings.push({ label, formatter, colorize });
    updateAudioLabels();
}

function applySceneAudio() {
    stopAudioHandle(currentMusicHandle);
    stopAudioHandle(currentAmbienceHandle);
    currentMusicHandle = null;
    currentAmbienceHandle = null;

    if (!audioPrimed || audioMuted) {
        updateAudioLabels();
        return;
    }

    try {
        if (currentSceneAudio.music) {
            currentMusicHandle = play(currentSceneAudio.music.name, {
                loop: true,
                volume: currentSceneAudio.music.volume,
            });
        }
        if (currentSceneAudio.ambience) {
            currentAmbienceHandle = play(currentSceneAudio.ambience.name, {
                loop: true,
                volume: currentSceneAudio.ambience.volume,
            });
        }
    } catch {}

    updateAudioLabels();
}

function setSceneAudio(config) {
    currentSceneAudio = config;
    applySceneAudio();
}

function primeAudio() {
    if (audioPrimed) return;
    audioPrimed = true;
    applySceneAudio();
}

function toggleMute() {
    audioMuted = !audioMuted;
    if (!audioMuted && !audioPrimed) {
        audioPrimed = true;
    }
    applySceneAudio();
    if (!audioMuted) {
        try {
            play("uiConfirm", { volume: 0.22 });
        } catch {}
    }
}

function playSfx(name, options = {}) {
    primeAudio();
    if (audioMuted) return null;
    try {
        return play(name, { ...(SFX_DEFAULTS[name] || {}), ...options });
    } catch {
        return null;
    }
}

await Promise.all([
    loadSpriteAtlas("assets/backgrounds/backdrops.svg", {
        menuBackdrop: { x: 0, y: 0, width: 304, height: 280 },
        gameBackdrop: { x: 320, y: 0, width: 304, height: 280 },
    }),
    loadSpriteAtlas("assets/ui/panels.svg", {
        hudPanel: { x: 0, y: 0, width: 304, height: 40 },
        menuPlaque: { x: 0, y: 40, width: 220, height: 70 },
        menuButton: { x: 0, y: 110, width: 154, height: 28 },
        menuButtonActive: { x: 0, y: 138, width: 154, height: 28 },
        controlsPanel: { x: 0, y: 166, width: 280, height: 184 },
        pausePanel: { x: 0, y: 350, width: 228, height: 176 },
    }),
    loadSpriteAtlas("assets/ui/icons.svg", {
        heart: { x: 0, y: 0, width: 10, height: 9 },
        heartEmpty: { x: 10, y: 0, width: 10, height: 9 },

    }),
    loadSprite("gameLogo", "assets/ui/logo.png"),
    loadSpriteAtlas("assets/world/tiles.svg", {
        floor: { x: 0, y: 0, width: 16, height: 16 },
        wall: { x: 16, y: 0, width: 16, height: 16 },
        box: { x: 32, y: 0, width: 16, height: 16 },
    }),
    loadSpriteAtlas("assets/characters/chars.svg", {
        player: { x: 0, y: 0, width: 16, height: 16 },
        zombie: { x: 16, y: 0, width: 16, height: 16 },
    }),
    loadSpriteAtlas("assets/items/items.svg", {
        bomb: { x: 0, y: 0, width: 16, height: 16 },
        explosion: { x: 16, y: 0, width: 16, height: 16 },
        bombPower: { x: 32, y: 0, width: 12, height: 12 },
        firePower: { x: 44, y: 0, width: 12, height: 12 },
    }),
    loadSprite("playerAnim", PLAYER_SHEET_PATH, {
        sliceX: 6,
        sliceY: 8,
        anims: PLAYER_ANIMS,
    }),
    loadSprite("zombieAnim", ZOMBIE_SHEET_PATH, {
        sliceX: 4,
        sliceY: 7,
        anims: ZOMBIE_ANIMS,
    }),
    loadSprite("bombAnim", BOMB_SHEET_PATH, {
        sliceX: 6,
        sliceY: 1,
        anims: BOMB_ANIMS,
    }),
    loadSprite("explosionAnim", EXPLOSION_SHEET_PATH, {
        sliceX: 3,
        sliceY: 5,
        anims: EXPLOSION_ANIMS,
    }),
    loadSound("uiMove", "assets/audio/ui-move.wav"),
    loadSound("uiConfirm", "assets/audio/ui-confirm.wav"),
    loadSound("uiBack", "assets/audio/ui-back.wav"),
    loadSound("pauseToggle", "assets/audio/pause-toggle.wav"),
    loadSound("bombPlace", "assets/audio/bomb-place.wav"),
    loadSound("bombAlert", "assets/audio/bomb-alert.wav"),
    loadSound("explosionSfx", "assets/audio/explosion.wav"),
    loadSound("playerHitSfx", "assets/audio/player-hit.wav"),
    loadSound("zombieDown", "assets/audio/zombie-down.wav"),
    loadSound("pickupSfx", "assets/audio/pickup.wav"),
    loadSound("victorySfx", "assets/audio/victory.wav"),
    loadSound("failureSfx", "assets/audio/failure.wav"),
    loadSound("menuTheme", "assets/audio/menu-theme.wav"),
    loadSound("streetTheme", "assets/audio/street-theme.wav"),
    loadSound("streetAmbience", "assets/audio/street-ambience.wav"),
]);

function generateMap() {
    gameMap = [];
    for (let y = 0; y < MAP_HEIGHT; y++) {
        gameMap[y] = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (x === 0 || y === 0 || x === MAP_WIDTH - 1 || y === MAP_HEIGHT - 1) {
                gameMap[y][x] = SOLID;
            } else if (isEdgeCorridor(x, y)) {
                gameMap[y][x] = EMPTY;
            } else if (x % 2 === 0 && y % 2 === 0) {
                gameMap[y][x] = SOLID;
            } else {
                gameMap[y][x] = EMPTY;
            }
        }
    }

    const safeZone = new Set(["1,1", "2,1", "1,2", "3,1", "1,3", "2,2"]);
    for (let y = 1; y < MAP_HEIGHT - 1; y++) {
        for (let x = 1; x < MAP_WIDTH - 1; x++) {
            if (
                gameMap[y][x] === EMPTY
                && !safeZone.has(`${x},${y}`)
                && !isEdgeCorridor(x, y)
                && Math.random() < 0.24
            ) {
                gameMap[y][x] = DESTRUCTIBLE;
            }
        }
    }
}

function clearTag(tag) {
    get(tag).forEach((obj) => destroy(obj));
}

    add([

    add([
        rect(178, 1),

    ]);
    add([
        rect(178, 1),

    const menuPlayer = add([
        sprite("playerAnim", { anim: "walk-side" }),
        pos(-40, 138),
        anchor("center"),
        scale(1.02),
    ]);
    const menuZombie = add([
        sprite("zombieAnim", { anim: "walk-side" }),
        pos(-70, 140),
        anchor("center"),
        scale(1.02),
    ]);
    const chaseDust = [0, 1, 2].map((index) => add([
        circle(2 + index * 0.45),
        pos(-100, -100),
        anchor("center"),
        scale(1),
        color(174, 160, 132),
        opacity(0),
        z(1),
    ]));

    const chasePatterns = [
        { leader: "zombie", chaser: "player", direction: 1 },
        { leader: "player", chaser: "zombie", direction: -1 },
    ];
    let chaseIndex = 0;
    let chaseTimer = 0;
    const chaseDuration = 3.6;
    const chaseResetDelay = 0.55;
    const chaseCycleDuration = chaseDuration + chaseResetDelay;

    function configureChase(index) {
        chaseIndex = index % chasePatterns.length;
        chaseTimer = 0;

        const pattern = chasePatterns[chaseIndex];
        menuPlayer.play("walk-side");
        menuZombie.play("walk-side");
        menuPlayer.flipX = pattern.direction < 0;
        menuZombie.flipX = pattern.direction < 0;
        menuPlayer.hidden = false;
        menuZombie.hidden = false;
        chaseDust.forEach((puff) => {
            puff.hidden = false;
            puff.opacity = 0;
        });
    }

    configureChase(0);

    const options = [
        { label: "INICIAR OPERACAO", target: "game" },
        { label: "COMO JOGAR", target: "controls" },
        { label: () => audioMuted ? "SOM: OFF" : "SOM: ON", isSoundToggle: true },
    ];

    let selected = 0;
    const buttons = [];
    const labels = [];

    options.forEach((option, index) => {
        const y = 162 + index * 40;
        const button = add([
            sprite(index === selected ? "menuButtonActive" : "menuButton"),
            pos(width() / 2, y),
            anchor("center"),
        ]);
        const labelText = typeof option.label === 'function' ? option.label() : option.label;
        const label = add([
            text(labelText, { size: 14 }),
            pos(width() / 2, y + 1),
            anchor("center"),
            color(index === selected ? 240 : 196, index === selected ? 244 : 173, index === selected ? 236 : 186),
        ]);
        buttons.push(button);
        labels.push(label);
    });

    const leftBat = add([
        sprite("selectorBat"),
        pos(width() / 2 - 96, 162),
        anchor("center"),
    ]);
    const rightBat = add([
        sprite("selectorBat"),
        pos(width() / 2 + 96, 162),
        anchor("center"),
        scale(vec2(-1, 1)),
    ]);

    function refreshMenu() {
        buttons.forEach((button, index) => {
            button.use(sprite(index === selected ? "menuButtonActive" : "menuButton"));
            labels[index].color = index === selected ? rgb(240, 244, 236) : rgb(196, 173, 186);
            if (typeof options[index].label === 'function') {
                labels[index].text = options[index].label();
            }
        });
        leftBat.pos.y = 162 + selected * 40;
        rightBat.pos.y = 162 + selected * 40;
    }

    onUpdate(() => {
        const pulse = 1 + Math.sin(time() * 8) * 0.08;
        leftBat.scale = vec2(pulse, pulse);
        rightBat.scale = vec2(-pulse, pulse);

        chaseTimer += dt();
        if (chaseTimer >= chaseCycleDuration) {
            configureChase(chaseIndex + 1);
        }

        if (chaseTimer <= chaseDuration) {
            const pattern = chasePatterns[chaseIndex];
            const progress = chaseTimer / chaseDuration;
            const direction = pattern.direction;
            const laneStart = direction === 1 ? -34 : width() + 34;
            const laneEnd = direction === 1 ? width() + 34 : -34;
            const leadX = laneStart + (laneEnd - laneStart) * progress;
            const gap = 28 - Math.sin(progress * Math.PI) * 10;
            const chaseX = leadX - direction * gap;

            const leaderSprite = pattern.leader === "player" ? menuPlayer : menuZombie;
            const chaserSprite = pattern.chaser === "player" ? menuPlayer : menuZombie;

            leaderSprite.hidden = false;
            chaserSprite.hidden = false;

            leaderSprite.pos = vec2(leadX, 124 + Math.sin(time() * 12.5) * 1.2);
            chaserSprite.pos = vec2(chaseX, 127 + Math.sin(time() * 12.5 + 0.8) * 1.2);

            chaseDust.forEach((puff, index) => {
                const drift = 10 + index * 7 + Math.sin(time() * 10 + index) * 1.4;
                const sway = 2 + index * 1.4;
                puff.hidden = false;
                puff.pos = vec2(
                    chaserSprite.pos.x - direction * drift,
                    chaserSprite.pos.y + 7 + Math.sin(time() * 8 + index) * sway,
                );
                puff.opacity = 0.18 + index * 0.08 + Math.sin(time() * 12 + index) * 0.04;
                puff.scale = vec2(1 + index * 0.16, 0.85 + index * 0.08);
            });
        } else {
            menuPlayer.hidden = true;
            menuZombie.hidden = true;
            chaseDust.forEach((puff) => {
                puff.hidden = true;
                puff.opacity = 0;
            });
        }
    });

    function menuUp() {
        selected = (selected - 1 + options.length) % options.length;
        playSfx("uiMove");
        refreshMenu();
    }
    function menuDown() {
        selected = (selected + 1) % options.length;
        playSfx("uiMove");
        refreshMenu();
    }
    function menuConfirm() {
        const opt = options[selected];
        if (opt.isSoundToggle) {
            toggleMute();
            refreshMenu();
            return;
        }
        playSfx("uiConfirm");
        go(opt.target);
    }

    onKeyPress("up",    menuUp);
    onKeyPress("down",  menuDown);
    onKeyPress("enter", menuConfirm);

    // Virtual controls: D-pad navigates, X confirms, START ignored
    let vNavTimer = 0;
    onUpdate(() => {
        vNavTimer -= dt();
        if (vNavTimer <= 0) {
            if (vKeys.up)   { menuUp();   vNavTimer = 0.22; }
            if (vKeys.down) { menuDown(); vNavTimer = 0.22; }
        }
        if (virtualBombPressed)  { virtualBombPressed  = false; menuConfirm(); }
        if (virtualPausePressed) { virtualPausePressed = false; }
    });

    add([
        text("Use as setas para navegar e ENTER para escolher", { size: 10 }),
        pos(width() / 2, height() - 18),
        anchor("center"),
        color(149, 160, 154),
    ]);

    onKeyPress("t", () => { toggleMute(); refreshMenu(); });
});

scene("game", () => {
    setSceneAudio({
        music: { name: "streetTheme", volume: 0.2 },

    generateMap();

    // Clear any lingering virtual button flags from menu/previous scene

    let maxBombs = START_BOMBS;

    let isPaused = false;
    let isInvincible = false;

    let enemiesDefeated = 0;
    let totalEnemies = 0;
    let pauseSelection = 0;
    let pauseButtons = [];
    let pauseLabels = [];
    let resultSelection = 0;
    let resultButtons = [];
    let resultLabels = [];
    let resultOptions = [];

    add([sprite("gameBackdrop"), pos(0, 0)]);

    for (let y = 0; y < MAP_HEIGHT; y++) {

                ]);

                    sprite("box"),

                    area(),
                    body({ isStatic: true }),
                    z(4),
                    "box",

                ]);

    add([
        text(GAME_KICKER, { size: 8 }),
        pos(width() / 2, 8),
        anchor("center"),
        color(231, 203, 121),
        fixed(),
        z(101),
    ]);

    const hearts = [];
    for (let i = 0; i < START_LIVES; i++) {
        hearts.push(add([
            sprite("heart"),
            pos(18 + i * 15, 23),
            anchor("center"),
            scale(1.3),
            fixed(),
            z(101),
        ]));
    }

    add([
        sprite("bombPower"),
        pos(102, 23),
        anchor("center"),
        scale(1.3),
        fixed(),
        z(101),
    ]);
    const bombCountText = add([
        text("x1", { size: 14 }),
        pos(114, 23),
        anchor("left"),
        color(239, 215, 159),
        fixed(),
        z(101),
    ]);

    add([
        sprite("firePower"),
        pos(146, 23),
        anchor("center"),
        scale(1.3),
        fixed(),
        z(101),
    ]);
    const fireCountText = add([
        text("x2", { size: 14 }),
        pos(158, 23),
        anchor("left"),
        color(239, 195, 120),
        fixed(),
        z(101),
    ]);

    add([
        text("ESC PAUSA", { size: 8 }),
        pos(width() - 8, 12),
        anchor("right"),
        color(182, 194, 188),
        fixed(),
        z(101),
    ]);

    const player = add([
        sprite("player"),
        opacity(0),
        pos(worldPos(1, 1)),
        area({ shape: new Rect(vec2(3, 2), 10, 13) }),
        body(),
        anchor("center"),
        z(actorDepth(worldPos(1, 1).y)),
        "player",
        {
            speed: 120,
            passThroughBomb: null,
            facing: "down",
            visualOffset: ACTOR_VISUAL_OFFSET,
            isHidden: false,
        },
    ]);

    function syncActorVisual(actor) {
        if (!actor.visual || !actor.visual.exists()) return;
        actor.visual.pos = actor.pos.add(actor.visualOffset);
        actor.visual.z = actorDepth(actor.pos.y);
        actor.visual.hidden = actor.isHidden;
    }

    function setActorHidden(actor, hidden) {
        actor.isHidden = hidden;
        if (actor.visual && actor.visual.exists()) {
            actor.visual.hidden = hidden;
        }
    }

    function playActorAnim(actor, animName, flipX = false, flipY = false) {
        if (!actor.visual || !actor.visual.exists()) return;
        if (actor.visual.animName !== animName) {
            actor.visual.play(animName);
            actor.visual.animName = animName;
        }
        actor.visual.flipX = flipX;
        actor.visual.flipY = flipY;
    }

    function updateActorVisual(actor, moving) {
        let animName = "idle-down";
        let flipX = false;

        if (actor.facing === "left") {
            animName = moving ? "walk-side" : "idle-side";
            flipX = true;
        } else if (actor.facing === "right") {
            animName = moving ? "walk-side" : "idle-side";
        } else if (actor.facing === "up") {
            animName = moving ? "walk-up" : "idle-up";
        } else {
            animName = moving ? "walk-down" : "idle-down";
        }

        playActorAnim(actor, animName, flipX);
        syncActorVisual(actor);
    }

    function createActorVisual(actor, spriteName, defaultAnim) {
        actor.visual = add([
            sprite(spriteName, { anim: defaultAnim }),
            pos(actor.pos.add(actor.visualOffset)),
            anchor("center"),
            z(actorDepth(actor.pos.y)),
        ]);
        actor.visual.animName = defaultAnim;
        actor.visual.hidden = actor.isHidden;
        syncActorVisual(actor);
    }

    createActorVisual(player, "playerAnim", "idle-down");

    function updateHearts() {
        hearts.forEach((heart, index) => {
            heart.use(sprite(index < lives ? "heart" : "heartEmpty"));
        });
    }

    function updateStats() {
        bombCountText.text = `x${maxBombs}`;
        fireCountText.text = `x${firePower}`;
    }

    function formatBattleTime(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
        const seconds = String(totalSeconds % 60).padStart(2, "0");
        return `${minutes}:${seconds}`;
    }

    function showToast(message, tint) {
        const toast = add([
            text(message, { size: 14 }),
            pos(width() / 2, 56),
            anchor("center"),
            color(tint[0], tint[1], tint[2]),
            fixed(),
            z(140),
            move(UP, 16),
            opacity(1),
            "toast",
        ]);

        wait(0.7, () => {
            if (toast.exists()) destroy(toast);
        });
    }

    function clearResultUI() {
        clearTag("resultUI");
        resultButtons = [];
        resultLabels = [];
        resultOptions = [];
    }

    function refreshResultMenu() {
        resultButtons.forEach((button, index) => {
            button.use(sprite(index === resultSelection ? "menuButtonActive" : "menuButton"));
            resultLabels[index].color = index === resultSelection
                ? rgb(240, 244, 236)
                : rgb(196, 173, 186);
        });
    }

    function runResultSelection() {
        if (resultOptions.length === 0) return;
        playSfx("uiConfirm");
        resultOptions[resultSelection].action();
    }

    function openResultScreen(title, tint, subtitle, statLines) {
        runEnded = true;
        isPaused = false;
        clearPauseUI();
        clearTag("toast");
        clearResultUI();

        resultOptions = [
            { label: "Tentar de novo", action: () => go("game") },
            { label: "Tela inicial", action: () => go("menu") },
        ];

        const hasStats = statLines.length > 0;
        const panelY = height() / 2 + (hasStats ? -4 : -6);
        const titleSize = hasStats ? 20 : 24;
        const subtitleSize = hasStats ? 10 : 11;
        const statSize = hasStats ? 11 : 12;
        const titleY = panelY - (hasStats ? 64 : 68);
        const subtitleY = panelY - (hasStats ? 44 : 42);
        const statStartY = panelY - 24;
        const statSpacing = hasStats ? 15 : 18;
        const buttonStartY = panelY + (hasStats ? 32 : 24);
        const buttonSpacing = hasStats ? 26 : 28;

        add([
            rect(width(), height()),
            pos(0, 0),
            color(0, 0, 0),
            opacity(0.68),
            fixed(),
            z(149),
            "resultUI",
        ]);
        add([
            sprite("controlsPanel"),
            pos(width() / 2, panelY),
            anchor("center"),
            fixed(),
            z(150),
            "resultUI",
        ]);
        add([
            text(title, { size: titleSize }),
            pos(width() / 2, titleY),
            anchor("center"),
            color(tint[0], tint[1], tint[2]),
            fixed(),
            z(151),
            "resultUI",
        ]);
        add([
            text(subtitle, { size: subtitleSize }),
            pos(width() / 2, subtitleY),
            anchor("center"),
            color(196, 173, 186),
            fixed(),
            z(151),
            "resultUI",
        ]);

        statLines.forEach((line, index) => {
            add([
                text(line, { size: statSize }),
                pos(width() / 2, statStartY + index * statSpacing),
                anchor("center"),
                color(224, 214, 221),
                fixed(),
                z(151),
                "resultUI",
            ]);
        });

        resultSelection = 0;
        resultOptions.forEach((option, index) => {
            const y = buttonStartY + index * buttonSpacing;
            const button = add([
                sprite(index === 0 ? "menuButtonActive" : "menuButton"),
                pos(width() / 2, y),
                anchor("center"),
                fixed(),
                z(151),
                "resultUI",
            ]);
            const label = add([
                text(option.label, { size: 12 }),
                pos(width() / 2, y + 1),
                anchor("center"),
                color(index === 0 ? 240 : 196, index === 0 ? 244 : 173, index === 0 ? 236 : 186),
                fixed(),
                z(152),
                "resultUI",
            ]);
            resultButtons.push(button);
            resultLabels.push(label);
        });

        refreshResultMenu();
    }

    function tileHasBomb(gx, gy) {
        return get("bomb").find((bomb) => bomb.gridX === gx && bomb.gridY === gy);
    }

    function tileBlockedForEnemy(gx, gy) {
        if (!inBounds(gx, gy)) return true;
        if (gameMap[gy][gx] === SOLID || gameMap[gy][gx] === DESTRUCTIBLE) return true;
        return Boolean(tileHasBomb(gx, gy));
    }

    function entityOccupiesTile(entity, gx, gy) {
        const entityGrid = gridFromPos(entity.pos);
        return entityGrid.x === gx && entityGrid.y === gy;
    }

    function defeatZombie(zombie) {
        if (!zombie.exists()) return;
        if (zombie.visual && zombie.visual.exists()) {
            destroy(zombie.visual);
        }
        playSfx("zombieDown");
        destroy(zombie);
        enemiesDefeated += 1;
    }

    function spawnExplosion(gx, gy, spriteState = { anim: "center", flipX: false, flipY: false }) {
        const exp = add([
            sprite("explosionAnim", {
                anim: spriteState.anim,
                flipX: spriteState.flipX,
                flipY: spriteState.flipY,
            }),
            pos(worldPos(gx, gy)),
            area({ shape: new Rect(vec2(-7, -7), 14, 14) }),
            anchor("center"),
            z(40),
            "explosion",
        ]);

        get("zombie").forEach((zombie) => {
            if (zombie.exists() && entityOccupiesTile(zombie, gx, gy)) {
                defeatZombie(zombie);
            }
        });

        if (player.exists() && entityOccupiesTile(player, gx, gy)) {
            playerHit();
        }

        checkWin();

        wait(0.45, () => {
            if (exp.exists()) destroy(exp);
        });
    }

    function spawnPowerup(gx, gy) {
        if (Math.random() > 0.55) return;

        const kind = Math.random() < 0.5 ? POWER_BOMB : POWER_FIRE;
        add([
            sprite(kind === POWER_BOMB ? "bombPower" : "firePower"),
            pos(worldPos(gx, gy)),
            area({ shape: new Rect(vec2(-3, -3), 6, 6) }),
            anchor("center"),
            z(12),
            "powerup",
            { powerType: kind },
        ]);
    }

    function getExplosionSpriteState(dir, isEnd) {
        if (dir.x !== 0) {
            return {
                anim: isEnd ? "horizontal-end-right" : "horizontal-mid",
                flipX: dir.x < 0,
                flipY: false,
            };
        }

        return {
            anim: isEnd ? "vertical-end-down" : "vertical-mid",
            flipX: false,
            flipY: dir.y < 0,
        };
    }

    function explodeBomb(bomb) {
        if (!bomb.exists()) return;

        const { gridX, gridY, range } = bomb;
        playSfx("explosionSfx");
        destroy(bomb);

        if (player.passThroughBomb === bomb) {
            player.passThroughBomb = null;
        }

        spawnExplosion(gridX, gridY);

        const dirs = [
            { x: 1, y: 0 },
            { x: -1, y: 0 },
            { x: 0, y: 1 },
            { x: 0, y: -1 },
        ];

        dirs.forEach((dir) => {
            for (let step = 1; step <= range; step++) {
                const nx = gridX + dir.x * step;
                const ny = gridY + dir.y * step;

                if (!inBounds(nx, ny)) break;
                if (gameMap[ny][nx] === SOLID) break;

                const otherBomb = tileHasBomb(nx, ny);
                const nextX = nx + dir.x;
                const nextY = ny + dir.y;
                const isEnd = step === range
                    || gameMap[ny][nx] === DESTRUCTIBLE
                    || Boolean(otherBomb)
                    || !inBounds(nextX, nextY)
                    || gameMap[nextY][nextX] === SOLID;

                spawnExplosion(nx, ny, getExplosionSpriteState(dir, isEnd));

                if (gameMap[ny][nx] === DESTRUCTIBLE) {
                    gameMap[ny][nx] = EMPTY;
                    get("destructible").forEach((box) => {
                        if (box.gridX === nx && box.gridY === ny) {
                            destroy(box);
                            spawnPowerup(nx, ny);
                        }
                    });
                    break;
                }

                if (otherBomb) {
                    wait(0.05, () => explodeBomb(otherBomb));
                    break;
                }
            }
        });
    }

    function placeBomb() {
        if (isPaused || runEnded) return;

        const activeBombs = get("bomb");
        if (activeBombs.length >= maxBombs) return;

        const { x, y } = gridFromPos(player.pos);
        if (!inBounds(x, y) || tileHasBomb(x, y)) return;

        const bomb = add([
            sprite("bombAnim", { anim: "fuse" }),
            pos(worldPos(x, y)),
            area({ shape: new Rect(vec2(-6, -6), 12, 12) }),
            anchor("center"),
            z(18),
            "bomb",
            { gridX: x, gridY: y, range: firePower, phase: "fuse" },
        ]);

        playSfx("bombPlace");
        player.passThroughBomb = bomb;

        wait(2.35, () => {
            if (!bomb.exists()) return;
            bomb.play("alert");
            bomb.phase = "alert";
            playSfx("bombAlert");
        });

        wait(3, () => explodeBomb(bomb));
    }

    function respawnPlayer() {
        player.pos = worldPos(1, 1);
        player.passThroughBomb = null;
        player.facing = "down";
        updateActorVisual(player, false);
    }

    onUpdate(() => {
        if (virtualPausePressed) { virtualPausePressed = false; togglePause(); }

        vNavTimer -= dt();

        if (isPaused) {
            if (vNavTimer <= 0) {
                if (vKeys.up) {
                    pauseSelection = (pauseSelection - 1 + pauseOptions.length) % pauseOptions.length;
                    playSfx("uiMove"); refreshPauseMenu(); vNavTimer = 0.22;
                } else if (vKeys.down) {
                    pauseSelection = (pauseSelection + 1) % pauseOptions.length;
                    playSfx("uiMove"); refreshPauseMenu(); vNavTimer = 0.22;
                }
            }
            if (virtualBombPressed) { virtualBombPressed = false; runPauseSelection(); }
            return;
        }

        if (runEnded) {
            if (resultOptions.length > 0 && vNavTimer <= 0) {
                if (vKeys.up) {
                    resultSelection = (resultSelection - 1 + resultOptions.length) % resultOptions.length;
                    playSfx("uiMove"); refreshResultMenu(); vNavTimer = 0.22;
                } else if (vKeys.down) {
                    resultSelection = (resultSelection + 1) % resultOptions.length;
                    playSfx("uiMove"); refreshResultMenu(); vNavTimer = 0.22;
                }
            }
            if (virtualBombPressed && resultOptions.length > 0) { virtualBombPressed = false; runResultSelection(); }
            return;
        }

        if (player.passThroughBomb) {
            if (!player.passThroughBomb.exists()) {
                player.passThroughBomb = null;
            } else {
                const currentGrid = gridFromPos(player.pos);
                if (currentGrid.x !== player.passThroughBomb.gridX || currentGrid.y !== player.passThroughBomb.gridY) {
                    player.passThroughBomb = null;
                }
            }
        }

        let dirX = 0;
        let dirY = 0;

        if      (isKeyDown("left")  || isKeyDown("a") || vKeys.left)  dirX = -1;
        else if (isKeyDown("right") || isKeyDown("d") || vKeys.right) dirX =  1;
        else if (isKeyDown("up")    || isKeyDown("w") || vKeys.up)    dirY = -1;
        else if (isKeyDown("down")  || isKeyDown("s") || vKeys.down)  dirY =  1;

        let isMoving = false;

        if (dirX !== 0 || dirY !== 0) {
            if (dirX < 0) player.facing = "left";
            else if (dirX > 0) player.facing = "right";
            else if (dirY < 0) player.facing = "up";
            else if (dirY > 0) player.facing = "down";

            const currentGrid = gridFromPos(player.pos);
            const nextGridX = currentGrid.x + dirX;
            const nextGridY = currentGrid.y + dirY;
            const bombOnNext = tileHasBomb(nextGridX, nextGridY);
            const canCrossBomb = bombOnNext && player.passThroughBomb === bombOnNext;

            if (!bombOnNext || canCrossBomb) {
                player.move(dirX * player.speed, dirY * player.speed);
                isMoving = true;
            }
        }

        updateActorVisual(player, isMoving);

        if (virtualBombPressed) { virtualBombPressed = false; placeBomb(); }
    });

    const spawnCandidates = [
        { x: MAP_WIDTH - 3, y: MAP_HEIGHT - 3 },
        { x: MAP_WIDTH - 3, y: 3 },
        { x: 3, y: MAP_HEIGHT - 3 },
    ];

    const zombieSpawns = [];
    spawnCandidates.forEach((origin) => {
        let placed = false;
        for (let dy = -1; dy <= 1 && !placed; dy++) {
            for (let dx = -1; dx <= 1 && !placed; dx++) {
                const x = origin.x + dx;
                const y = origin.y + dy;
                if (inBounds(x, y) && gameMap[y][x] === EMPTY) {
                    zombieSpawns.push({ x, y });
                    placed = true;
                }
            }
        }
    });

    zombieSpawns.forEach((spawn) => {
        const zombie = add([
            sprite("zombie"),
            opacity(0),
            pos(worldPos(spawn.x, spawn.y)),
            area({ shape: new Rect(vec2(3, 2), 10, 13) }),
            anchor("center"),
            z(actorDepth(worldPos(spawn.x, spawn.y).y)),
            "zombie",
            {
                speed: 42,
                direction: choose(["left", "right", "up", "down"]),
                moveTimer: rand(0.4, 1.4),
                facing: "down",
                visualOffset: ACTOR_VISUAL_OFFSET,
                isHidden: false,
            },
        ]);

        zombie.facing = zombie.direction;
        createActorVisual(zombie, "zombieAnim", "idle-down");
        updateActorVisual(zombie, false);
    });
    totalEnemies = zombieSpawns.length;

    function chooseOpenDirection(zombie) {
        const current = gridFromPos(zombie.pos);
        const options = [
            { name: "left", x: -1, y: 0 },
            { name: "right", x: 1, y: 0 },
            { name: "up", x: 0, y: -1 },
            { name: "down", x: 0, y: 1 },
        ].filter((dir) => !tileBlockedForEnemy(current.x + dir.x, current.y + dir.y));

        if (options.length > 0) {
            zombie.direction = choose(options).name;
        }
    }

    onUpdate("zombie", (zombie) => {
        if (isPaused || runEnded) return;

        zombie.moveTimer -= dt();
        if (zombie.moveTimer <= 0) {
            zombie.moveTimer = rand(0.5, 1.6);
            if (Math.random() < 0.55) {
                chooseOpenDirection(zombie);
            }
        }

        let dir = { x: 0, y: 0 };
        if (zombie.direction === "left") dir = { x: -1, y: 0 };
        if (zombie.direction === "right") dir = { x: 1, y: 0 };
        if (zombie.direction === "up") dir = { x: 0, y: -1 };
        if (zombie.direction === "down") dir = { x: 0, y: 1 };
        zombie.facing = zombie.direction;

        const laneGrid = gridFromPos(zombie.pos);
        const laneCenter = worldPos(laneGrid.x, laneGrid.y);
        if (dir.x !== 0) {
            zombie.pos.y += (laneCenter.y - zombie.pos.y) * 0.35;
            if (Math.abs(zombie.pos.y - laneCenter.y) < 0.2) {
                zombie.pos.y = laneCenter.y;
            }
        }
        if (dir.y !== 0) {
            zombie.pos.x += (laneCenter.x - zombie.pos.x) * 0.35;
            if (Math.abs(zombie.pos.x - laneCenter.x) < 0.2) {
                zombie.pos.x = laneCenter.x;
            }
        }

        const nextPos = zombie.pos.add(vec2(dir.x * zombie.speed * dt(), dir.y * zombie.speed * dt()));
        const currentGrid = gridFromPos(zombie.pos);
        const nextGrid = gridFromPos(nextPos);

        if ((nextGrid.x !== currentGrid.x || nextGrid.y !== currentGrid.y) && tileBlockedForEnemy(nextGrid.x, nextGrid.y)) {
            chooseOpenDirection(zombie);
            zombie.facing = zombie.direction;
            updateActorVisual(zombie, false);
            return;
        }

        zombie.pos = nextPos;
        updateActorVisual(zombie, true);
    });

    player.onCollide("powerup", (powerup) => {
        if (powerup.powerType === POWER_BOMB) {
            maxBombs += 1;
            updateStats();
            showToast("+ Carga", [239, 215, 159]);
        } else {
            firePower += 1;
            updateStats();
            showToast("+ Alcance", [255, 168, 87]);
        }
        playSfx("pickupSfx");
        destroy(powerup);
    });

    function endRun(message, tint, restartDelay) {
        if (runEnded) return;
        if (message === "OPERACAO FALHOU") {
            playSfx("failureSfx");
        }
        openResultScreen(message, tint, "Escolha sua proxima acao", []);
    }

    function showVictorySummary() {
        if (runEnded) return;
        playSfx("victorySfx");

        const lines = [
            `Tempo: ${formatBattleTime(Date.now() - battleStartedAt)}`,
            `Ferimentos: ${START_LIVES - lives}`,
            `Zumbis eliminados: ${enemiesDefeated}/${totalEnemies}`,
        ];
        openResultScreen("AREA LIMPA", [236, 208, 122], "Resumo da varredura", lines);
    }

    function playerHit() {
        if (isPaused || isInvincible || runEnded) return;

        lives -= 1;
        updateHearts();
        playSfx("playerHitSfx");

        if (lives <= 0) {
            endRun("OPERACAO FALHOU", [219, 76, 98], 2);
            return;
        }

        isInvincible = true;
        setActorHidden(player, true);
        showToast("Mordida!", [219, 76, 98]);

        wait(0.7, () => {
            respawnPlayer();
            setActorHidden(player, false);

            let flashes = 0;
            const blink = setInterval(() => {
                setActorHidden(player, !player.isHidden);
                flashes += 1;
                if (flashes >= 10) {
                    clearInterval(blink);
                    setActorHidden(player, false);
                    isInvincible = false;
                }
            }, 100);
        });
    }

    function checkWin() {
        if (runEnded) return;
        if (get("zombie").length === 0) {
            showVictorySummary();
        }
    }

    player.onCollide("zombie", () => playerHit());

    function clearPauseUI() {
        clearTag("pauseUI");
        pauseButtons = [];
        pauseLabels = [];
    }

    function refreshPauseMenu() {
        pauseButtons.forEach((button, index) => {
            button.use(sprite(index === pauseSelection ? "menuButtonActive" : "menuButton"));
            pauseLabels[index].color = index === pauseSelection
                ? rgb(240, 244, 236)
                : rgb(196, 173, 186);
            if (typeof pauseOptions[index].label === 'function') {
                pauseLabels[index].text = pauseOptions[index].label();
            }
        });
    }

    function closePause() {
        isPaused = false;
        clearPauseUI();
    }

    function runPauseSelection() {
        playSfx("uiConfirm");
        pauseOptions[pauseSelection].action();
    }

    function openPause() {
        isPaused = true;
        clearPauseUI();

        add([
            rect(width(), height()),
            pos(0, 0),
            color(0, 0, 0),
            opacity(0.62),
            fixed(),
            z(130),
            "pauseUI",
        ]);
        add([
            sprite("pausePanel"),
            pos(width() / 2, height() / 2),
            anchor("center"),
            fixed(),
            z(131),
            "pauseUI",
        ]);
        add([
            text("OPERACAO PAUSADA", { size: 18 }),
            pos(width() / 2, height() / 2 - 56),
            anchor("center"),
            color(236, 208, 122),
            fixed(),
            z(132),
            "pauseUI",
        ]);
        add([
            text("Escolha sua proxima acao", { size: 10 }),
            pos(width() / 2, height() / 2 - 38),
            anchor("center"),
            color(182, 194, 188),
            fixed(),
            z(132),
            "pauseUI",
        ]);

        pauseSelection = 0;
        pauseOptions.forEach((option, index) => {
            const y = height() / 2 - 34 + index * 32;
            const button = add([
                sprite(index === 0 ? "menuButtonActive" : "menuButton"),
                pos(width() / 2, y),
                anchor("center"),
                fixed(),
                z(132),
                "pauseUI",
            ]);
            const labelText = typeof option.label === 'function' ? option.label() : option.label;
            const label = add([
                text(labelText, { size: 12 }),
                pos(width() / 2, y + 1),
                anchor("center"),
                color(index === 0 ? 240 : 196, index === 0 ? 244 : 173, index === 0 ? 236 : 186),
                fixed(),
                z(133),
                "pauseUI",
            ]);
            pauseButtons.push(button);
            pauseLabels.push(label);
        });

        refreshPauseMenu();
    }

    function togglePause() {
        if (get("resultUI").length > 0) return;

        if (isPaused) {
            playSfx("pauseToggle");
            closePause();
        } else {
            playSfx("pauseToggle");
            openPause();
        }
    }

    onKeyPress("space", placeBomb);
    onKeyPress("z", placeBomb);
    onKeyPress("x", placeBomb);
    onKeyPress("up", () => {
        if (isPaused) {
            pauseSelection = (pauseSelection - 1 + pauseOptions.length) % pauseOptions.length;
            playSfx("uiMove");
            refreshPauseMenu();
            return;
        }
        if (runEnded && resultOptions.length > 0) {
            resultSelection = (resultSelection - 1 + resultOptions.length) % resultOptions.length;
            playSfx("uiMove");
            refreshResultMenu();
        }
    });
    onKeyPress("down", () => {
        if (isPaused) {
            pauseSelection = (pauseSelection + 1) % pauseOptions.length;
            playSfx("uiMove");
            refreshPauseMenu();
            return;
        }
        if (runEnded && resultOptions.length > 0) {
            resultSelection = (resultSelection + 1) % resultOptions.length;
            playSfx("uiMove");
            refreshResultMenu();
        }
    });
    onKeyPress("enter", () => {
        if (isPaused) {
            runPauseSelection();
            return;
        }
        if (runEnded && resultOptions.length > 0) {
            runResultSelection();
        }
    });
    onKeyPress("t", toggleMute);
    onKeyPress("escape", togglePause);
    onKeyPress("p", togglePause);
    onKeyPress("r", () => {
        if (isPaused || (runEnded && resultOptions.length > 0)) {
            playSfx("uiConfirm");
            go("game");
        }
    });
    onKeyPress("m", () => {
        if (isPaused || (runEnded && resultOptions.length > 0)) {
            playSfx("uiBack");
            go("menu");
        }
    });

    updateHearts();
    updateStats();
});

go("menu");
    </script>
</body>
</html>
