<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombervania</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top, #41203f 0%, #140813 50%, #060405 100%);
            font-family: Georgia, serif;
        }

        canvas {
            border: 4px solid #4e274b;
            box-shadow:
                0 0 0 4px rgba(18, 7, 18, 0.95),
                0 24px 60px rgba(0, 0, 0, 0.65),
                0 0 40px rgba(139, 42, 87, 0.35);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <script type="module">
import kaboom from "https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs";

if (location.protocol === "file:") {
    document.body.innerHTML = `
        <main style="max-width:720px;padding:32px 28px;border:4px solid #4e274b;box-shadow:0 24px 60px rgba(0,0,0,.65),0 0 40px rgba(139,42,87,.35);background:linear-gradient(180deg,#1f0d1a 0%,#120811 100%);color:#f0d59c;line-height:1.5;">
            <h1 style="font-size:32px;margin-bottom:12px;">Bombervania</h1>
            <p style="margin-bottom:12px;color:#d9c7cf;">Agora os sprites estao em arquivos separados dentro de <code>assets/</code>. Navegadores bloqueiam esse carregamento quando o jogo e aberto por <code>file://</code>.</p>
            <p style="margin-bottom:12px;color:#d9c7cf;">Para rodar corretamente:</p>
            <ol style="padding-left:22px;margin-bottom:14px;color:#f0d59c;">
                <li>Execute <code>start-local-server.bat</code></li>
                <li>Abra <code>http://localhost:8080</code></li>
            </ol>
            <p style="color:#bfa7b7;">Se preferir, voce tambem pode usar qualquer servidor HTTP local.</p>
        </main>
    `;
    await new Promise(() => {});
}

kaboom({
    width: 320,
    height: 280,
    scale: 2.5,
    crisp: true,
    background: [8, 5, 10],
});

const TILE_SIZE = 16;
const MAP_WIDTH = 20;
const MAP_HEIGHT = 15;
const HUD_HEIGHT = 40;
const MAP_OFFSET_Y = HUD_HEIGHT;
const START_LIVES = 3;
const START_BOMBS = 1;
const START_FIRE = 2;

const SOLID = 1;
const DESTRUCTIBLE = 2;
const EMPTY = 0;
const POWER_BOMB = "bomb";
const POWER_FIRE = "fire";

let gameMap = [];

function worldPos(gx, gy) {
    return vec2(gx * TILE_SIZE + TILE_SIZE / 2, gy * TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y);
}

function gridFromPos(pos) {
    return {
        x: Math.round((pos.x - TILE_SIZE / 2) / TILE_SIZE),
        y: Math.round((pos.y - MAP_OFFSET_Y - TILE_SIZE / 2) / TILE_SIZE),
    };
}

function inBounds(gx, gy) {
    return gx >= 0 && gx < MAP_WIDTH && gy >= 0 && gy < MAP_HEIGHT;
}

await Promise.all([
    loadSpriteAtlas("assets/backgrounds/backdrops.svg", {
        menuBackdrop: { x: 0, y: 0, width: 320, height: 280 },
        gameBackdrop: { x: 320, y: 0, width: 320, height: 280 },
    }),
    loadSpriteAtlas("assets/ui/panels.svg", {
        hudPanel: { x: 0, y: 0, width: 320, height: 40 },
        menuPlaque: { x: 0, y: 40, width: 220, height: 70 },
        menuButton: { x: 0, y: 110, width: 154, height: 28 },
        menuButtonActive: { x: 0, y: 138, width: 154, height: 28 },
        controlsPanel: { x: 0, y: 166, width: 280, height: 184 },
        pausePanel: { x: 0, y: 350, width: 228, height: 176 },
    }),
    loadSpriteAtlas("assets/ui/icons.svg", {
        heart: { x: 0, y: 0, width: 10, height: 9 },
        heartEmpty: { x: 10, y: 0, width: 10, height: 9 },
        selectorBat: { x: 20, y: 0, width: 18, height: 10 },
    }),
    loadSpriteAtlas("assets/world/tiles.svg", {
        floor: { x: 0, y: 0, width: 16, height: 16 },
        wall: { x: 16, y: 0, width: 16, height: 16 },
        box: { x: 32, y: 0, width: 16, height: 16 },
    }),
    loadSpriteAtlas("assets/characters/chars.svg", {
        player: { x: 0, y: 0, width: 16, height: 16 },
        zombie: { x: 16, y: 0, width: 16, height: 16 },
    }),
    loadSpriteAtlas("assets/items/items.svg", {
        bomb: { x: 0, y: 0, width: 16, height: 16 },
        explosion: { x: 16, y: 0, width: 16, height: 16 },
        bombPower: { x: 32, y: 0, width: 12, height: 12 },
        firePower: { x: 44, y: 0, width: 12, height: 12 },
    }),
]);

function generateMap() {
    gameMap = [];
    for (let y = 0; y < MAP_HEIGHT; y++) {
        gameMap[y] = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (x === 0 || y === 0 || x === MAP_WIDTH - 1 || y === MAP_HEIGHT - 1) {
                gameMap[y][x] = SOLID;
            } else if (x % 2 === 0 && y % 2 === 0) {
                gameMap[y][x] = SOLID;
            } else {
                gameMap[y][x] = EMPTY;
            }
        }
    }

    const safeZone = new Set(["1,1", "2,1", "1,2", "3,1", "1,3", "2,2"]);
    for (let y = 1; y < MAP_HEIGHT - 1; y++) {
        for (let x = 1; x < MAP_WIDTH - 1; x++) {
            if (gameMap[y][x] === EMPTY && !safeZone.has(`${x},${y}`) && Math.random() < 0.2) {
                gameMap[y][x] = DESTRUCTIBLE;
            }
        }
    }
}

function clearTag(tag) {
    get(tag).forEach((obj) => destroy(obj));
}

scene("menu", () => {
    add([sprite("menuBackdrop"), pos(0, 0)]);

    add([
        sprite("menuPlaque"),
        pos(width() / 2, 58),
        anchor("center"),
    ]);

    add([
        text("BOMBERVANIA", { size: 26 }),
        pos(width() / 2, 46),
        anchor("center"),
        color(232, 200, 123),
    ]);

    add([
        text("Castelo Maldito", { size: 12 }),
        pos(width() / 2, 67),
        anchor("center"),
        color(182, 116, 150),
    ]);

    add([
        text("Cace os mortos, abra caminho e sobreviva.", { size: 10 }),
        pos(width() / 2, 112),
        anchor("center"),
        color(185, 173, 180),
    ]);

    const options = [
        { label: "INICIAR JOGO", target: "game" },
        { label: "CONTROLES", target: "controls" },
    ];

    let selected = 0;
    const buttons = [];
    const labels = [];

    options.forEach((option, index) => {
        const y = 162 + index * 40;
        const button = add([
            sprite(index === selected ? "menuButtonActive" : "menuButton"),
            pos(width() / 2, y),
            anchor("center"),
        ]);
        const label = add([
            text(option.label, { size: 14 }),
            pos(width() / 2, y + 1),
            anchor("center"),
            color(index === selected ? 255 : 196, index === selected ? 222 : 173, index === selected ? 150 : 186),
        ]);
        buttons.push(button);
        labels.push(label);
    });

    const leftBat = add([
        sprite("selectorBat"),
        pos(width() / 2 - 96, 162),
        anchor("center"),
    ]);
    const rightBat = add([
        sprite("selectorBat"),
        pos(width() / 2 + 96, 162),
        anchor("center"),
        scale(vec2(-1, 1)),
    ]);

    function refreshMenu() {
        buttons.forEach((button, index) => {
            button.use(sprite(index === selected ? "menuButtonActive" : "menuButton"));
            labels[index].color = index === selected ? rgb(255, 225, 150) : rgb(196, 173, 186);
        });
        leftBat.pos.y = 162 + selected * 40;
        rightBat.pos.y = 162 + selected * 40;
    }

    onUpdate(() => {
        const pulse = 1 + Math.sin(time() * 8) * 0.08;
        leftBat.scale = vec2(pulse, pulse);
        rightBat.scale = vec2(-pulse, pulse);
    });

    onKeyPress("up", () => {
        selected = (selected - 1 + options.length) % options.length;
        refreshMenu();
    });

    onKeyPress("down", () => {
        selected = (selected + 1) % options.length;
        refreshMenu();
    });

    onKeyPress("enter", () => {
        go(options[selected].target);
    });

    add([
        text("Use as setas para navegar e ENTER para escolher", { size: 10 }),
        pos(width() / 2, height() - 18),
        anchor("center"),
        color(153, 129, 145),
    ]);
});

                color(121, 71, 104),

            add([
                rect(4, 10),
                pos(45, y),
                anchor("center"),

            ]);

                rect(4, 10),

    onKeyPress("enter", () => go("menu"));

scene("game", () => {
    generateMap();

    let lives = START_LIVES;
    let maxBombs = START_BOMBS;
    let firePower = START_FIRE;
    let isPaused = false;
    let isInvincible = false;
    let runEnded = false;
    let pauseSelection = 0;
    let pauseButtons = [];
    let pauseLabels = [];

    const pauseOptions = [
        { label: "Voltar ao jogo", action: () => closePause() },
        { label: "Reiniciar fase", action: () => go("game") },
        { label: "Menu inicial", action: () => go("menu") },
    ];

    add([sprite("gameBackdrop"), pos(0, 0)]);
    add([sprite("hudPanel"), pos(0, 0), fixed(), z(100)]);

    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) {
            add([
                sprite("floor"),
                pos(x * TILE_SIZE, MAP_OFFSET_Y + y * TILE_SIZE),
                z(1),
            ]);

            if (gameMap[y][x] === SOLID) {
                add([
                    sprite("wall"),
                    pos(x * TILE_SIZE, MAP_OFFSET_Y + y * TILE_SIZE),
                    area(),
                    body({ isStatic: true }),
                    z(5),
                    "wall",
                ]);
            } else if (gameMap[y][x] === DESTRUCTIBLE) {
                add([
                    sprite("box"),
                    pos(x * TILE_SIZE, MAP_OFFSET_Y + y * TILE_SIZE),
                    area(),
                    body({ isStatic: true }),
                    z(4),
                    "box",
                    "destructible",
                    { gridX: x, gridY: y },
                ]);
            }
        }
    }

    add([
        text("BOMBERVANIA", { size: 12 }),
        pos(width() / 2, 8),
        anchor("center"),
        color(233, 203, 127),
        fixed(),
        z(101),
    ]);

    const hearts = [];
    for (let i = 0; i < START_LIVES; i++) {
        hearts.push(add([
            sprite("heart"),
            pos(14 + i * 16, 25),
            anchor("center"),
            scale(1.3),
            fixed(),
            z(101),
        ]));
    }

    add([
        sprite("bombPower"),
        pos(116, 24),
        anchor("center"),
        scale(1.3),
        fixed(),
        z(101),
    ]);
    const bombCountText = add([
        text("x1", { size: 14 }),
        pos(132, 24),
        anchor("left"),
        color(239, 215, 159),
        fixed(),
        z(101),
    ]);

    add([
        sprite("firePower"),
        pos(180, 24),
        anchor("center"),
        scale(1.3),
        fixed(),
        z(101),
    ]);
    const fireCountText = add([
        text("x2", { size: 14 }),
        pos(196, 24),
        anchor("left"),
        color(239, 195, 120),
        fixed(),
        z(101),
    ]);

    add([
        text("ESC", { size: 10 }),
        pos(width() - 10, 12),
        anchor("right"),
        color(182, 116, 150),
        fixed(),
        z(101),
    ]);
    add([
        text("PAUSA", { size: 10 }),
        pos(width() - 10, 25),
        anchor("right"),
        color(133, 111, 128),
        fixed(),
        z(101),
    ]);

    const player = add([
        sprite("player"),
        pos(worldPos(1, 1)),
        area({ shape: new Rect(vec2(3, 2), 10, 13) }),
        body(),
        anchor("center"),
        z(20),
        "player",
        {
            speed: 120,
            passThroughBomb: null,
        },
    ]);

    function updateHearts() {
        hearts.forEach((heart, index) => {
            heart.use(sprite(index < lives ? "heart" : "heartEmpty"));
        });
    }

    function updateStats() {
        bombCountText.text = `x${maxBombs}`;
        fireCountText.text = `x${firePower}`;
    }

    function showToast(message, tint) {
        const toast = add([
            text(message, { size: 14 }),
            pos(width() / 2, 56),
            anchor("center"),
            color(tint[0], tint[1], tint[2]),
            fixed(),
            z(140),
            move(UP, 16),
            opacity(1),
            "toast",
        ]);

        wait(0.7, () => {
            if (toast.exists()) destroy(toast);
        });
    }

    function tileHasBomb(gx, gy) {
        return get("bomb").find((bomb) => bomb.gridX === gx && bomb.gridY === gy);
    }

    function tileBlockedForEnemy(gx, gy) {
        if (!inBounds(gx, gy)) return true;
        if (gameMap[gy][gx] === SOLID || gameMap[gy][gx] === DESTRUCTIBLE) return true;
        return Boolean(tileHasBomb(gx, gy));
    }

    function spawnExplosion(gx, gy) {
        const exp = add([
            sprite("explosion"),
            pos(worldPos(gx, gy)),
            area({ shape: new Rect(vec2(-7, -7), 14, 14) }),
            anchor("center"),
            z(30),
            "explosion",
        ]);

        get("zombie").forEach((zombie) => {
            const zombieGrid = gridFromPos(zombie.pos);
            if (zombieGrid.x === gx && zombieGrid.y === gy && zombie.exists()) {
                destroy(zombie);
            }
        });

        checkWin();

        wait(0.45, () => {
            if (exp.exists()) destroy(exp);
        });
    }

    function spawnPowerup(gx, gy) {
        if (Math.random() > 0.55) return;

        const kind = Math.random() < 0.5 ? POWER_BOMB : POWER_FIRE;
        add([
            sprite(kind === POWER_BOMB ? "bombPower" : "firePower"),
            pos(worldPos(gx, gy)),
            area({ shape: new Rect(vec2(-3, -3), 6, 6) }),
            anchor("center"),
            z(12),
            "powerup",
            { powerType: kind },
        ]);
    }

    function explodeBomb(bomb) {
        if (!bomb.exists()) return;

        const { gridX, gridY, range } = bomb;
        destroy(bomb);

        if (player.passThroughBomb === bomb) {
            player.passThroughBomb = null;
        }

        spawnExplosion(gridX, gridY);

        const dirs = [
            { x: 1, y: 0 },
            { x: -1, y: 0 },
            { x: 0, y: 1 },
            { x: 0, y: -1 },
        ];

        dirs.forEach((dir) => {
            for (let step = 1; step <= range; step++) {
                const nx = gridX + dir.x * step;
                const ny = gridY + dir.y * step;

                if (!inBounds(nx, ny)) break;
                if (gameMap[ny][nx] === SOLID) break;

                spawnExplosion(nx, ny);

                if (gameMap[ny][nx] === DESTRUCTIBLE) {
                    gameMap[ny][nx] = EMPTY;
                    get("destructible").forEach((box) => {
                        if (box.gridX === nx && box.gridY === ny) {
                            destroy(box);
                            spawnPowerup(nx, ny);
                        }
                    });
                    break;
                }

                const otherBomb = tileHasBomb(nx, ny);
                if (otherBomb) {
                    wait(0.05, () => explodeBomb(otherBomb));
                    break;
                }
            }
        });
    }

    function placeBomb() {
        if (isPaused) return;

        const activeBombs = get("bomb");
        if (activeBombs.length >= maxBombs) return;

        const { x, y } = gridFromPos(player.pos);
        if (!inBounds(x, y) || tileHasBomb(x, y)) return;

        const bomb = add([
            sprite("bomb"),
            pos(worldPos(x, y)),
            area({ shape: new Rect(vec2(-6, -6), 12, 12) }),
            anchor("center"),
            z(18),
            "bomb",
            { gridX: x, gridY: y, range: firePower },
        ]);

        player.passThroughBomb = bomb;

        wait(3, () => explodeBomb(bomb));
    }

    function respawnPlayer() {
        player.pos = worldPos(1, 1);
        player.passThroughBomb = null;
    }

    onUpdate(() => {
        if (isPaused) return;

        if (player.passThroughBomb) {
            if (!player.passThroughBomb.exists()) {
                player.passThroughBomb = null;
            } else {
                const currentGrid = gridFromPos(player.pos);
                if (currentGrid.x !== player.passThroughBomb.gridX || currentGrid.y !== player.passThroughBomb.gridY) {
                    player.passThroughBomb = null;
                }
            }
        }

        let dirX = 0;
        let dirY = 0;

        if (isKeyDown("left") || isKeyDown("a")) dirX = -1;
        else if (isKeyDown("right") || isKeyDown("d")) dirX = 1;
        else if (isKeyDown("up") || isKeyDown("w")) dirY = -1;
        else if (isKeyDown("down") || isKeyDown("s")) dirY = 1;

        if (dirX !== 0 || dirY !== 0) {
            const currentGrid = gridFromPos(player.pos);
            const nextGridX = currentGrid.x + dirX;
            const nextGridY = currentGrid.y + dirY;
            const bombOnNext = tileHasBomb(nextGridX, nextGridY);
            const canCrossBomb = bombOnNext && player.passThroughBomb === bombOnNext;

            if (!bombOnNext || canCrossBomb) {
                player.move(dirX * player.speed, dirY * player.speed);
            }
        }
    });

    const spawnCandidates = [
        { x: MAP_WIDTH - 3, y: MAP_HEIGHT - 3 },
        { x: MAP_WIDTH - 3, y: 3 },
        { x: 3, y: MAP_HEIGHT - 3 },
    ];

    const zombieSpawns = [];
    spawnCandidates.forEach((origin) => {
        let placed = false;
        for (let dy = -1; dy <= 1 && !placed; dy++) {
            for (let dx = -1; dx <= 1 && !placed; dx++) {
                const x = origin.x + dx;
                const y = origin.y + dy;
                if (inBounds(x, y) && gameMap[y][x] === EMPTY) {
                    zombieSpawns.push({ x, y });
                    placed = true;
                }
            }
        }
    });

    zombieSpawns.forEach((spawn) => {
        add([
            sprite("zombie"),
            pos(worldPos(spawn.x, spawn.y)),
            area({ shape: new Rect(vec2(3, 2), 10, 13) }),
            anchor("center"),
            z(20),
            "zombie",
            {
                speed: 42,
                direction: choose(["left", "right", "up", "down"]),
                moveTimer: rand(0.4, 1.4),
            },
        ]);
    });

    function chooseOpenDirection(zombie) {
        const current = gridFromPos(zombie.pos);
        const options = [
            { name: "left", x: -1, y: 0 },
            { name: "right", x: 1, y: 0 },
            { name: "up", x: 0, y: -1 },
            { name: "down", x: 0, y: 1 },
        ].filter((dir) => !tileBlockedForEnemy(current.x + dir.x, current.y + dir.y));

        if (options.length > 0) {
            zombie.direction = choose(options).name;
        }
    }

    onUpdate("zombie", (zombie) => {
        if (isPaused) return;

        zombie.moveTimer -= dt();
        if (zombie.moveTimer <= 0) {
            zombie.moveTimer = rand(0.5, 1.6);
            if (Math.random() < 0.55) {
                chooseOpenDirection(zombie);
            }
        }

        let dir = { x: 0, y: 0 };
        if (zombie.direction === "left") dir = { x: -1, y: 0 };
        if (zombie.direction === "right") dir = { x: 1, y: 0 };
        if (zombie.direction === "up") dir = { x: 0, y: -1 };
        if (zombie.direction === "down") dir = { x: 0, y: 1 };

        const laneGrid = gridFromPos(zombie.pos);
        const laneCenter = worldPos(laneGrid.x, laneGrid.y);
        if (dir.x !== 0) {
            zombie.pos.y += (laneCenter.y - zombie.pos.y) * 0.35;
            if (Math.abs(zombie.pos.y - laneCenter.y) < 0.2) {
                zombie.pos.y = laneCenter.y;
            }
        }
        if (dir.y !== 0) {
            zombie.pos.x += (laneCenter.x - zombie.pos.x) * 0.35;
            if (Math.abs(zombie.pos.x - laneCenter.x) < 0.2) {
                zombie.pos.x = laneCenter.x;
            }
        }

        const nextPos = zombie.pos.add(vec2(dir.x * zombie.speed * dt(), dir.y * zombie.speed * dt()));
        const currentGrid = gridFromPos(zombie.pos);
        const nextGrid = gridFromPos(nextPos);

        if ((nextGrid.x !== currentGrid.x || nextGrid.y !== currentGrid.y) && tileBlockedForEnemy(nextGrid.x, nextGrid.y)) {
            chooseOpenDirection(zombie);
            return;
        }

        zombie.pos = nextPos;
    });

    player.onCollide("powerup", (powerup) => {
        if (powerup.powerType === POWER_BOMB) {
            maxBombs += 1;
            updateStats();
            showToast("+ Bomba", [239, 215, 159]);
        } else {
            firePower += 1;
            updateStats();
            showToast("+ Fogo", [255, 168, 87]);
        }
        destroy(powerup);
    });

    function endRun(message, tint, restartDelay) {
        if (runEnded) return;
        runEnded = true;
        clearTag("pauseUI");
        add([
            sprite("pausePanel"),
            pos(width() / 2, height() / 2),
            anchor("center"),
            fixed(),
            z(150),
            "resultUI",
        ]);
        add([
            text(message, { size: 28 }),
            pos(width() / 2, height() / 2 - 16),
            anchor("center"),
            color(tint[0], tint[1], tint[2]),
            fixed(),
            z(151),
            "resultUI",
        ]);
        add([
            text("Reiniciando...", { size: 11 }),
            pos(width() / 2, height() / 2 + 18),
            anchor("center"),
            color(196, 173, 186),
            fixed(),
            z(151),
            "resultUI",
        ]);
        wait(restartDelay, () => go("game"));
    }

    function playerHit() {
        if (isPaused || isInvincible || runEnded) return;

        lives -= 1;
        updateHearts();

        if (lives <= 0) {
            endRun("GAME OVER", [219, 76, 98], 2);
            return;
        }

        isInvincible = true;
        player.hidden = true;
        showToast("Vida perdida", [219, 76, 98]);

        wait(0.7, () => {
            respawnPlayer();
            player.hidden = false;

            let flashes = 0;
            const blink = setInterval(() => {
                player.hidden = !player.hidden;
                flashes += 1;
                if (flashes >= 10) {
                    clearInterval(blink);
                    player.hidden = false;
                    isInvincible = false;
                }
            }, 100);
        });
    }

    function checkWin() {
        if (runEnded) return;
        if (get("zombie").length === 0) {
            endRun("VOCE VENCEU", [236, 208, 122], 2);
        }
    }

    player.onCollide("zombie", () => playerHit());
    player.onCollide("explosion", () => playerHit());

    onCollide("explosion", "zombie", (_exp, zombie) => {
        if (zombie.exists()) destroy(zombie);
        checkWin();
    });

    function clearPauseUI() {
        clearTag("pauseUI");
        pauseButtons = [];
        pauseLabels = [];
    }

    function refreshPauseMenu() {
        pauseButtons.forEach((button, index) => {
            button.use(sprite(index === pauseSelection ? "menuButtonActive" : "menuButton"));
            pauseLabels[index].color = index === pauseSelection
                ? rgb(255, 225, 150)
                : rgb(196, 173, 186);
        });
    }

    function closePause() {
        isPaused = false;
        clearPauseUI();
    }

    function runPauseSelection() {
        pauseOptions[pauseSelection].action();
    }

    function openPause() {
        isPaused = true;
        clearPauseUI();

        add([
            rect(width(), height()),
            pos(0, 0),
            color(0, 0, 0),
            opacity(0.62),
            fixed(),
            z(130),
            "pauseUI",
        ]);
        add([
            sprite("pausePanel"),
            pos(width() / 2, height() / 2),
            anchor("center"),
            fixed(),
            z(131),
            "pauseUI",
        ]);
        add([
            text("PAUSADO", { size: 24 }),
            pos(width() / 2, height() / 2 - 56),
            anchor("center"),
            color(236, 208, 122),
            fixed(),
            z(132),
            "pauseUI",
        ]);
        add([
            text("Escolha uma opcao", { size: 10 }),
            pos(width() / 2, height() / 2 - 38),
            anchor("center"),
            color(196, 173, 186),
            fixed(),
            z(132),
            "pauseUI",
        ]);

        pauseSelection = 0;
        pauseOptions.forEach((option, index) => {
            const y = height() / 2 - 18 + index * 32;
            const button = add([
                sprite(index === 0 ? "menuButtonActive" : "menuButton"),
                pos(width() / 2, y),
                anchor("center"),
                fixed(),
                z(132),
                "pauseUI",
            ]);
            const label = add([
                text(option.label, { size: 12 }),
                pos(width() / 2, y + 1),
                anchor("center"),
                color(index === 0 ? 255 : 196, index === 0 ? 225 : 173, index === 0 ? 150 : 186),
                fixed(),
                z(133),
                "pauseUI",
            ]);
            pauseButtons.push(button);
            pauseLabels.push(label);
        });

        add([
            text("SETAS + ENTER", { size: 10 }),
            pos(width() / 2, height() / 2 + 68),
            anchor("center"),
            color(153, 129, 145),
            fixed(),
            z(132),
            "pauseUI",
        ]);

        refreshPauseMenu();
    }

    function togglePause() {
        if (get("resultUI").length > 0) return;

        if (isPaused) {
            closePause();
        } else {
            openPause();
        }
    }

    onKeyPress("space", placeBomb);
    onKeyPress("z", placeBomb);
    onKeyPress("x", placeBomb);
    onKeyPress("up", () => {
        if (!isPaused) return;
        pauseSelection = (pauseSelection - 1 + pauseOptions.length) % pauseOptions.length;
        refreshPauseMenu();
    });
    onKeyPress("down", () => {
        if (!isPaused) return;
        pauseSelection = (pauseSelection + 1) % pauseOptions.length;
        refreshPauseMenu();
    });
    onKeyPress("enter", () => {
        if (!isPaused) return;
        runPauseSelection();
    });
    onKeyPress("escape", togglePause);
    onKeyPress("p", togglePause);
    onKeyPress("r", () => {
        if (isPaused) go("game");
    });
    onKeyPress("m", () => {
        if (isPaused) go("menu");
    });

    updateHearts();
    updateStats();
});

go("menu");
    </script>
</body>
</html>
