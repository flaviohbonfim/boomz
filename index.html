<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castlevania Bomberman</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a0a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        canvas { border: 4px solid #4a2a4a; box-shadow: 0 0 30px rgba(128, 0, 128, 0.5); }
    </style>
</head>
<body>
    <script src="https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs" type="module"></script>
    <script type="module">
import kaboom from "https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs";

const k = kaboom({
    width: 448,
    height: 496,
    background: [25, 10, 25],
    scale: 1.5,
    crisp: true,
});

const TILE_SIZE = 16;
const MAP_WIDTH = 28;
const MAP_HEIGHT = 29;
const HUD_HEIGHT = 32;
const MAP_OFFSET_Y = HUD_HEIGHT;

function makeSpriteData(charMap, props) {
    const canvas = document.createElement("canvas");
    canvas.width = charMap[0].length;
    canvas.height = charMap.length;
    const ctx = canvas.getContext("2d");
    
    charMap.forEach((row, y) => {
        for (let x = 0; x < row.length; x++) {
            const char = row[x];
            const color = props[char];
            if (color) {
                ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                ctx.fillRect(x, y, 1, 1);
            }
        }
    });
    
    return canvas;
}

const playerData = [
    "................",
    "........dddd....",
    ".......ddddd....",
    "......ddddddd...",
    ".....ddddddddd..",
    "....ddddddddddd.",
    "....dddddddddd..",
    "....dddddddddd..",
    ".....dddwddddd..",
    ".....ddddddddd..",
    "......ddddd.....",
    ".....d.dddd.d...",
    ".......dddd.....",
    "......d.d.d.....",
    ".....d.ddd.d....",
    "....d...ddd..d..",
];
loadSprite("player", makeSpriteData(playerData, {
    "d": [60, 30, 60],
    "w": [220, 200, 180],
}));

const wallData = [
    "BBBBBBBBBBBBBBBB",
    "BbbbbbbbbbbbbbbB",
    "BbGGGGGGGGGGGbbB",
    "BbGggggggggggbbB",
    "BbGgBBBBBBBBBgbB",
    "BbGgB.......BgbbB",
    "BbGgB.......BgbbB",
    "BbGgB.......BgbbB",
    "BbGgB.......BgbbB",
    "BbGgB.......BgbbB",
    "BbGgB.......BgbbB",
    "BbGgB.......BgbbB",
    "BbGgB.......BgbbB",
    "BbGgBBBBBBBBBgbB",
    "BbGggggggggggbbB",
    "BBBBBBBBBBBBBBBB",
];
loadSprite("wall", makeSpriteData(wallData, {
    "B": [40, 20, 40],
    "b": [60, 30, 60],
    "G": [80, 50, 80],
    "g": [100, 70, 100],
}));

const boxData = [
    "................",
    "WWWWWWWWWWWWWWWW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WwwwwwwwwwwwwwwW",
    "WWWWWWWWWWWWWWWW",
    "................",
];
loadSprite("box", makeSpriteData(boxData, {
    "W": [80, 50, 20],
    "w": [120, 80, 40],
}));

const bombData = [
    "................",
    "..IIIIIIIIIII...",
    ".IiiiiiiiiiiiI..",
    ".IiiiiIRRRRRiI..",
    ".IiIiIRRRRRRiiI.",
    ".IiIiIRRRRRRiiI.",
    ".IiIiIRRRRRRiiI.",
    ".IiIiIRRRRRRiiI.",
    ".IiIiIRRRRRRiiI.",
    ".IiIiIRRRRRRiiI.",
    ".IiIiIRRRRRRiiI.",
    ".IiiiiiiiiiiiI..",
    "..IiiiiiiiiiI...",
    "...III...III....",
    "......I.........",
    "................",
];
loadSprite("bomb", makeSpriteData(bombData, {
    "I": [30, 30, 30],
    "i": [50, 50, 50],
    "R": [180, 20, 20],
}));

const explosionData = [
    "....BBBBBB......",
    "..BbbBbbbBb......",
    ".BbBBWWWBBb.....",
    "BbbBWBBBBWBbb...",
    "BbBWBBWBBWBBb...",
    "BbBW....BWBBb...",
    "BBB......BBB....",
    "BBB......BBB....",
    "BbBW....BWBBb...",
    "BbBWWBWWWWBBb...",
    "BbbBWWWWWWBbb...",
    ".BbBBBBBBBbb....",
    "..Bbbbbbbb......",
    "....BBBB........",
    "................",
    "................",
];
loadSprite("explosion", makeSpriteData(explosionData, {
    "B": [100, 100, 255],
    "b": [150, 150, 255],
    "W": [255, 255, 255],
}));

const zombieData = [
    ".......GG.......",
    "....GGGGGGG.....",
    "...GGGGGGGGG....",
    "...GGGGGGGGG....",
    "...GgggGGggg....",
    "...GgggGGggg....",
    "....GGGGGGG.....",
    ".....GGGGG......",
    "...GGGGGGGGG....",
    "..GGGGGGGGGGG...",
    "..GGGGGGGGGGG...",
    "...GGGGGGGGG....",
    ".......GGG......",
    "......G.G.......",
    ".....G...G......",
    "................",
];
loadSprite("zombie", makeSpriteData(zombieData, {
    "G": [60, 100, 60],
    "g": [40, 80, 40],
}));

const heartData = [
    "..RRRR..",
    ".RRRRRR.",
    "RRRRRRRR",
    "RRRRRRRR",
    ".RRRRRR.",
    "..RRRR..",
    "...RR...",
    "....R...",
];
loadSprite("heart", makeSpriteData(heartData, {
    "R": [220, 30, 60],
}));

const heartEmptyData = [
    "..DDDD..",
    ".DDDDDD.",
    "DDDDDDDD",
    "DDDDDDDD",
    ".DDDDDD.",
    "..DDDD..",
    "...DD...",
    "....D...",
];
loadSprite("heartEmpty", makeSpriteData(heartEmptyData, {
    "D": [80, 40, 60],
}));

const SOLID = 1;
const DESTRUCTIBLE = 2;
const EMPTY = 0;

let gameMap = [];

function generateMap() {
    gameMap = [];
    for (let y = 0; y < MAP_HEIGHT; y++) {
        gameMap[y] = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (x === 0 || x === MAP_WIDTH - 1 || y === 0 || y === MAP_HEIGHT - 1) {
                gameMap[y][x] = SOLID;
            } else if (x % 2 === 0 && y % 2 === 0) {
                gameMap[y][x] = SOLID;
            } else {
                gameMap[y][x] = EMPTY;
            }
        }
    }
    
    const safeZone = [[1, 1], [2, 1], [1, 2], [3, 1], [1, 3], [2, 2]];
    
    for (let y = 1; y < MAP_HEIGHT - 1; y++) {
        for (let x = 1; x < MAP_WIDTH - 1; x++) {
            if (gameMap[y][x] === EMPTY) {
                const isSafe = safeZone.some(([sx, sy]) => x === sx && y === sy);
                if (!isSafe && Math.random() < 0.4) {
                    gameMap[y][x] = DESTRUCTIBLE;
                }
            }
        }
    }
}

scene("game", () => {
    generateMap();
    
    let lives = 3;
    let isPaused = false;
    
    add([
        rect(width(), HUD_HEIGHT),
        pos(0, 0),
        color(20, 5, 20),
        fixed(),
        z(100),
    ]);
    
    add([
        text("CASTLEVANIA BOMBER", { size: 14 }),
        pos(width() / 2, HUD_HEIGHT / 2),
        anchor("center"),
        color(150, 100, 150),
        fixed(),
        z(101),
    ]);
    
    const hearts = [];
    for (let i = 0; i < 3; i++) {
        const h = add([
            sprite("heart"),
            pos(20 + i * 22, HUD_HEIGHT / 2),
            anchor("center"),
            scale(1.5),
            fixed(),
            z(101),
        ]);
        hearts.push(h);
    }
    
    add([
        text("ESC: PAUSE", { size: 10 }),
        pos(width() - 10, HUD_HEIGHT / 2),
        anchor("right"),
        color(120, 80, 120),
        fixed(),
        z(101),
    ]);
    
    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) {
            const px = x * TILE_SIZE + TILE_SIZE / 2;
            const py = y * TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y;
            
            if (gameMap[y][x] === SOLID) {
                add([
                    sprite("wall"),
                    pos(px, py),
                    area(),
                    body({ isStatic: true }),
                    anchor("center"),
                    "wall",
                ]);
            } else if (gameMap[y][x] === DESTRUCTIBLE) {
                add([
                    sprite("box"),
                    pos(px, py),
                    area(),
                    body({ isStatic: true }),
                    anchor("center"),
                    "box",
                    "destructible",
                    { gridX: x, gridY: y },
                ]);
            }
        }
    }
    
    const player = add([
        sprite("player"),
        pos(TILE_SIZE + TILE_SIZE / 2, TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y),
        area({ shape: new Rect(vec2(3, 3), 10, 10) }),
        body(),
        anchor("center"),
        "player",
        { speed: 120 },
    ]);
    
    function updateHearts() {
        hearts.forEach((h, i) => {
            if (i < lives) {
                h.use(sprite("heart"));
            } else {
                h.use(sprite("heartEmpty"));
            }
        });
    }
    
    function respawnPlayer() {
        player.pos = vec2(TILE_SIZE + TILE_SIZE / 2, TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y);
    }
    
    onUpdate(() => {
        if (isPaused) return;
        
        let dirX = 0;
        let dirY = 0;
        
        if (isKeyDown("left") || isKeyDown("a")) dirX = -1;
        else if (isKeyDown("right") || isKeyDown("d")) dirX = 1;
        else if (isKeyDown("up") || isKeyDown("w")) dirY = -1;
        else if (isKeyDown("down") || isKeyDown("s")) dirY = 1;
        
        if (dirX !== 0 || dirY !== 0) {
            player.move(dirX * player.speed, dirY * player.speed);
        }
    });
    
    function placeBomb() {
        if (isPaused) return;
        
        const bombs = get("bomb");
        if (bombs.length >= 1) return;
        
        const relX = player.pos.x - TILE_SIZE / 2;
        const relY = player.pos.y - MAP_OFFSET_Y - TILE_SIZE / 2;
        
        const gx = Math.round(relX / TILE_SIZE);
        const gy = Math.round(relY / TILE_SIZE);
        
        const bombX = gx * TILE_SIZE + TILE_SIZE / 2;
        const bombY = gy * TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y;
        
        const bomb = add([
            sprite("bomb"),
            pos(bombX, bombY),
            area(),
            anchor("center"),
            "bomb",
            { gridX: gx, gridY: gy },
        ]);
        
        wait(3, () => {
            if (bomb.exists()) {
                explodeBomb(bomb);
            }
        });
    }
    
    onKeyPress("space", placeBomb);
    onKeyPress("z", placeBomb);
    
    function spawnExplosion(gx, gy) {
        const exp = add([
            sprite("explosion"),
            pos(gx * TILE_SIZE + TILE_SIZE / 2, gy * TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y),
            area(),
            anchor("center"),
            "explosion",
            "killZone",
        ]);
        
        wait(0.5, () => {
            if (exp.exists()) destroy(exp);
        });
    }
    
    function explodeBomb(bomb) {
        const gx = bomb.gridX;
        const gy = bomb.gridY;
        destroy(bomb);
        
        spawnExplosion(gx, gy);
        
        const directions = [
            { dx: 0, dy: -1 },
            { dx: 0, dy: 1 },
            { dx: -1, dy: 0 },
            { dx: 1, dy: 0 },
        ];
        
        directions.forEach(dir => {
            for (let i = 1; i <= 2; i++) {
                const nx = gx + dir.dx * i;
                const ny = gy + dir.dy * i;
                
                if (nx < 0 || nx >= MAP_WIDTH || ny < 0 || ny >= MAP_HEIGHT) break;
                if (gameMap[ny][nx] === SOLID) break;
                
                spawnExplosion(nx, ny);
                
                if (gameMap[ny][nx] === DESTRUCTIBLE) {
                    gameMap[ny][nx] = EMPTY;
                    
                    get("destructible").forEach(box => {
                        if (box.gridX === nx && box.gridY === ny) {
                            destroy(box);
                        }
                    });
                    break;
                }
                
                const chainBomb = get("bomb").find(b => b.gridX === nx && b.gridY === ny);
                if (chainBomb) {
                    wait(0.1, () => {
                        if (chainBomb.exists()) explodeBomb(chainBomb);
                    });
                    break;
                }
            }
        });
    }
    
    const zombieConfigs = [
        { x: MAP_WIDTH - 2, y: MAP_HEIGHT - 2 },
        { x: MAP_WIDTH - 2, y: 2 },
        { x: 2, y: MAP_HEIGHT - 2 },
    ];
    
    zombieConfigs.forEach(cfg => {
        const zombie = add([
            sprite("zombie"),
            pos(cfg.x * TILE_SIZE + TILE_SIZE / 2, cfg.y * TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y),
            area({ shape: new Rect(vec2(3, 3), 10, 10) }),
            body(),
            anchor("center"),
            "zombie",
            { 
                speed: 50,
                direction: choose(["up", "down", "left", "right"]),
                moveTimer: rand(1, 2),
            },
        ]);
    });
    
    onUpdate("zombie", (zombie) => {
        if (isPaused) return;
        
        zombie.moveTimer -= dt();
        
        if (zombie.moveTimer <= 0) {
            zombie.moveTimer = rand(1, 3);
            zombie.direction = choose(["up", "down", "left", "right"]);
        }
        
        const oldPos = zombie.pos.clone();
        let dirX = 0, dirY = 0;
        
        if (zombie.direction === "left") dirX = -1;
        else if (zombie.direction === "right") dirX = 1;
        else if (zombie.direction === "up") dirY = -1;
        else if (zombie.direction === "down") dirY = 1;
        
        zombie.move(dirX * zombie.speed, dirY * zombie.speed);
        
        const gx = Math.floor((zombie.pos.x - TILE_SIZE / 2) / TILE_SIZE);
        const gy = Math.floor((zombie.pos.y - MAP_OFFSET_Y - TILE_SIZE / 2) / TILE_SIZE);
        
        if (gx < 1 || gx >= MAP_WIDTH - 1 || gy < 1 || gy >= MAP_HEIGHT - 1) {
            zombie.pos = oldPos;
            zombie.direction = choose(["up", "down", "left", "right"]);
        }
    });
    
    player.onCollide("zombie", () => {
        playerHit();
    });
    
    player.onCollide("explosion", () => {
        playerHit();
    });
    
    let isInvincible = false;
    
    function playerHit() {
        if (isPaused || isInvincible) return;
        
        lives--;
        updateHearts();
        
        if (lives <= 0) {
            gameOver();
        } else {
            isInvincible = true;
            
            add([
                text("OUCH!", { size: 24 }),
                pos(width() / 2, height() / 2),
                anchor("center"),
                color(255, 50, 50),
                fixed(),
                z(200),
                "hitText",
            ]);
            
            player.hidden = true;
            
            wait(1, () => {
                get("hitText").forEach(e => destroy(e));
                respawnPlayer();
                player.hidden = false;
                
                let blinkCount = 0;
                const blinkInterval = setInterval(() => {
                    player.hidden = !player.hidden;
                    blinkCount++;
                    if (blinkCount >= 10) {
                        clearInterval(blinkInterval);
                        player.hidden = false;
                        isInvincible = false;
                    }
                }, 100);
            });
        }
    }
    
    function gameOver() {
        add([
            text("GAME OVER", { size: 48 }),
            pos(width() / 2, height() / 2),
            anchor("center"),
            color(200, 50, 50),
            fixed(),
            z(200),
        ]);
        
        wait(2, () => {
            go("game");
        });
    }
    
    function checkWin() {
        const zombies = get("zombie");
        if (zombies.length === 0) {
            add([
                text("YOU WIN!", { size: 48 }),
                pos(width() / 2, height() / 2),
                anchor("center"),
                color(255, 215, 0),
                fixed(),
                z(200),
            ]);
            wait(2, () => go("game"));
        }
    }
    
    onCollide("explosion", "zombie", () => {
        checkWin();
    });
    
    function togglePause() {
        isPaused = !isPaused;
        
        get("pauseUI").forEach(e => destroy(e));
        
        if (isPaused) {
            add([
                rect(width(), height()),
                pos(0, 0),
                color(0, 0, 0),
                opacity(0.7),
                fixed(),
                z(150),
                "pauseUI",
            ]);
            
            add([
                text("PAUSED", { size: 48 }),
                pos(width() / 2, height() / 2 - 30),
                anchor("center"),
                color(200, 150, 200),
                fixed(),
                z(151),
                "pauseUI",
            ]);
            
            add([
                text("Press ESC to resume", { size: 16 }),
                pos(width() / 2, height() / 2 + 20),
                anchor("center"),
                color(150, 100, 150),
                fixed(),
                z(151),
                "pauseUI",
            ]);
            
            add([
                text("Press R to restart", { size: 16 }),
                pos(width() / 2, height() / 2 + 50),
                anchor("center"),
                color(150, 100, 150),
                fixed(),
                z(151),
                "pauseUI",
            ]);
        }
    }
    
    onKeyPress("escape", togglePause);
    onKeyPress("p", togglePause);
    
    onKeyPress("r", () => {
        if (isPaused) {
            go("game");
        }
    });
});

go("game");
    </script>
</body>
</html>
