scene("game", () => {
    const phaseConfig = PHASES[currentPhase - 1];
    const diffConfig = DIFFICULTIES[selectedDifficulty];
    const _startStats = carryOverStats || { lives: START_LIVES, maxBombs: diffConfig.startBombs, firePower: diffConfig.startFire };

    setSceneAudio({
        music:    phaseConfig.music,
        ambience: phaseConfig.ambience,
    });

    generateMap();

    if (_startStats.destroyedTiles) applyDestroyedTiles(_startStats.destroyedTiles);

    // Clear any lingering virtual button flags from menu/previous scene
    virtualBombPressed  = false;
    virtualPausePressed = false;
    Object.keys(vKeys).forEach((k) => { vKeys[k] = false; });

    let lives = _startStats.lives;
    let maxBombs = _startStats.maxBombs;
    let firePower = _startStats.firePower;
    let isPaused = false;
    let isInvincible = false;
    let runEnded = false;
    const battleStartedAt = Date.now();
    let enemiesDefeated = _startStats.enemiesDefeated || 0;
    let totalEnemies = 0;
    let pauseSelection = 0;
    let pauseButtons = [];
    let pauseLabels = [];
    let pauseSoundIcon = null;
    let pauseSoundBtn = null;
    let pauseSoundText = null;
    let resultSelection = 0;
    let resultButtons = [];
    let resultLabels = [];
    let resultOptions = [];
    let vNavTimer = 0;

    const pauseOptions = [
        { label: "Voltar para a rua", action: () => closePause() },
        { label: "Recomecar varredura", action: () => go("game") },
        { label: "Salvar jogo", action: () => {
            openSlotPicker("save", (slot) => {
                activeSlot = slot;
                saveProgress(currentPhase, lives, maxBombs, firePower, collectDestroyedTiles(), enemiesDefeated);
                showToast("Jogo salvo!", [100, 220, 140]);
                closePause();
            });
        }},
        { label: "Tela inicial", action: () => { currentPhase = 1; carryOverStats = null; go("menu"); } },
        { label: () => audioMuted ? "Som: OFF" : "Som: ON", action: () => { toggleMute(); refreshPauseMenu(); } },
    ];

    add([sprite(phaseConfig.bg), pos(0, 0)]);
    add([sprite("hudPanel"), pos(0, 0), fixed(), z(100)]);

    const tileNames = phaseConfig.tiles;
    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) {
            add([
                sprite(tileNames.floor),
                pos(x * TILE_SIZE, MAP_OFFSET_Y + y * TILE_SIZE),
                z(1),
            ]);

            if (gameMap[y][x] === SOLID) {
                add([
                    sprite(tileNames.wall),
                    pos(x * TILE_SIZE, MAP_OFFSET_Y + y * TILE_SIZE),
                    area(),
                    body({ isStatic: true }),
                    z(5),
                    "wall",
                ]);
            } else if (gameMap[y][x] === DESTRUCTIBLE) {
                add([
                    sprite(tileNames.box),
                    pos(x * TILE_SIZE, MAP_OFFSET_Y + y * TILE_SIZE),
                    area(),
                    body({ isStatic: true }),
                    z(4),
                    "box",
                    "destructible",
                    { gridX: x, gridY: y },
                ]);
            }
        }
    }

    add([
        text(`FASE ${currentPhase}  •  ${GAME_KICKER}`, { size: 8 }),
        pos(width() / 2, 8),
        anchor("center"),
        color(231, 203, 121),
        fixed(),
        z(101),
    ]);

    const hearts = [];
    for (let i = 0; i < START_LIVES; i++) {
        hearts.push(add([
            sprite("heart"),
            pos(18 + i * 15, 23),
            anchor("center"),
            scale(1.3),
            fixed(),
            z(101),
        ]));
    }

    add([
        sprite("bombPower"),
        pos(102, 23),
        anchor("center"),
        scale(1.3),
        fixed(),
        z(101),
    ]);
    const bombCountText = add([
        text("x1", { size: 14 }),
        pos(114, 23),
        anchor("left"),
        color(239, 215, 159),
        fixed(),
        z(101),
    ]);

    add([
        sprite("firePower"),
        pos(146, 23),
        anchor("center"),
        scale(1.3),
        fixed(),
        z(101),
    ]);
    const fireCountText = add([
        text("x2", { size: 14 }),
        pos(158, 23),
        anchor("left"),
        color(239, 195, 120),
        fixed(),
        z(101),
    ]);

    add([
        text("ESC PAUSA", { size: 8 }),
        pos(width() - 8, 12),
        anchor("right"),
        color(182, 194, 188),
        fixed(),
        z(101),
    ]);

    const player = add([
        sprite("player"),
        opacity(0),
        pos(worldPos(1, 1)),
        area({ shape: new Rect(vec2(3, 2), 10, 13) }),
        body(),
        anchor("center"),
        z(actorDepth(worldPos(1, 1).y)),
        "player",
        {
            speed: diffConfig.playerSpeed,
            passThroughBomb: null,
            facing: "down",
            visualOffset: ACTOR_VISUAL_OFFSET,
            isHidden: false,
        },
    ]);

    function syncActorVisual(actor) {
        if (!actor.visual || !actor.visual.exists()) return;
        actor.visual.pos = actor.pos.add(actor.visualOffset);
        actor.visual.z = actorDepth(actor.pos.y);
        actor.visual.hidden = actor.isHidden;
    }

    function setActorHidden(actor, hidden) {
        actor.isHidden = hidden;
        if (actor.visual && actor.visual.exists()) {
            actor.visual.hidden = hidden;
        }
    }

    function playActorAnim(actor, animName, flipX = false, flipY = false) {
        if (!actor.visual || !actor.visual.exists()) return;
        if (actor.visual.animName !== animName) {
            actor.visual.play(animName);
            actor.visual.animName = animName;
        }
        actor.visual.flipX = flipX;
        actor.visual.flipY = flipY;
    }

    function updateActorVisual(actor, moving) {
        let animName = "idle-down";
        let flipX = false;

        if (actor.facing === "left") {
            animName = moving ? "walk-side" : "idle-side";
            flipX = true;
        } else if (actor.facing === "right") {
            animName = moving ? "walk-side" : "idle-side";
        } else if (actor.facing === "up") {
            animName = moving ? "walk-up" : "idle-up";
        } else {
            animName = moving ? "walk-down" : "idle-down";
        }

        playActorAnim(actor, animName, flipX);
        syncActorVisual(actor);
    }

    function createActorVisual(actor, spriteName, defaultAnim, tint) {
        const components = [
            sprite(spriteName, { anim: defaultAnim }),
            pos(actor.pos.add(actor.visualOffset)),
            anchor("center"),
            z(actorDepth(actor.pos.y)),
        ];
        if (tint) components.push(color(tint[0], tint[1], tint[2]));
        actor.visual = add(components);
        actor.visual.animName = defaultAnim;
        actor.visual.hidden = actor.isHidden;
        syncActorVisual(actor);
    }

    createActorVisual(player, "playerAnim", "idle-down");

    function updateHearts() {
        hearts.forEach((heart, index) => {
            heart.use(sprite(index < lives ? "heart" : "heartEmpty"));
        });
    }

    function updateStats() {
        bombCountText.text = `x${maxBombs}`;
        fireCountText.text = `x${firePower}`;
    }

    function formatBattleTime(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
        const seconds = String(totalSeconds % 60).padStart(2, "0");
        return `${minutes}:${seconds}`;
    }

    function showToast(message, tint) {
        const toast = add([
            text(message, { size: 14 }),
            pos(width() / 2, 56),
            anchor("center"),
            color(tint[0], tint[1], tint[2]),
            fixed(),
            z(140),
            move(UP, 16),
            opacity(1),
            "toast",
        ]);

        wait(0.7, () => {
            if (toast.exists()) destroy(toast);
        });
    }

    function clearResultUI() {
        clearTag("resultUI");
        resultButtons = [];
        resultLabels = [];
        resultOptions = [];
    }

    function refreshResultMenu() {
        resultButtons.forEach((button, index) => {
            button.use(sprite(index === resultSelection ? "menuButtonActive" : "menuButton"));
            resultLabels[index].color = index === resultSelection
                ? rgb(240, 244, 236)
                : rgb(196, 173, 186);
        });
    }

    function runResultSelection() {
        if (resultOptions.length === 0) return;
        playSfx("uiConfirm");
        resultOptions[resultSelection].action();
    }

    function openResultScreen(title, tint, subtitle, statLines, customOptions) {
        runEnded = true;
        isPaused = false;
        clearPauseUI();
        clearTag("toast");
        clearResultUI();

        resultOptions = customOptions || [
            { label: "Tentar de novo", action: () => { currentPhase = 1; carryOverStats = null; go("game"); } },
            { label: "Tela inicial",   action: () => { currentPhase = 1; carryOverStats = null; go("menu"); } },
        ];

        const hasStats = statLines.length > 0;
        const panelY = height() / 2 + (hasStats ? -4 : -6);
        const titleSize = hasStats ? 20 : 24;
        const subtitleSize = hasStats ? 10 : 11;
        const statSize = hasStats ? 11 : 12;
        const titleY = panelY - (hasStats ? 64 : 68);
        const subtitleY = panelY - (hasStats ? 44 : 42);
        const statStartY = panelY - 24;
        const statSpacing = hasStats ? 15 : 18;
        const buttonStartY = panelY + (hasStats ? 32 : 24);
        const buttonSpacing = hasStats ? 26 : 28;

        add([
            rect(width(), height()),
            pos(0, 0),
            color(0, 0, 0),
            opacity(0.68),
            fixed(),
            z(149),
            "resultUI",
        ]);
        add([
            sprite("controlsPanel"),
            pos(width() / 2, panelY),
            anchor("center"),
            fixed(),
            z(150),
            "resultUI",
        ]);
        add([
            text(title, { size: titleSize }),
            pos(width() / 2, titleY),
            anchor("center"),
            color(tint[0], tint[1], tint[2]),
            fixed(),
            z(151),
            "resultUI",
        ]);
        add([
            text(subtitle, { size: subtitleSize }),
            pos(width() / 2, subtitleY),
            anchor("center"),
            color(196, 173, 186),
            fixed(),
            z(151),
            "resultUI",
        ]);

        statLines.forEach((line, index) => {
            add([
                text(line, { size: statSize }),
                pos(width() / 2, statStartY + index * statSpacing),
                anchor("center"),
                color(224, 214, 221),
                fixed(),
                z(151),
                "resultUI",
            ]);
        });

        resultSelection = 0;
        resultOptions.forEach((option, index) => {
            const y = buttonStartY + index * buttonSpacing;
            const button = add([
                sprite(index === 0 ? "menuButtonActive" : "menuButton"),
                pos(width() / 2, y),
                anchor("center"),
                fixed(),
                z(151),
                "resultUI",
            ]);
            const label = add([
                text(option.label, { size: 12 }),
                pos(width() / 2, y + 1),
                anchor("center"),
                color(index === 0 ? 240 : 196, index === 0 ? 244 : 173, index === 0 ? 236 : 186),
                fixed(),
                z(152),
                "resultUI",
            ]);
            resultButtons.push(button);
            resultLabels.push(label);
        });

        refreshResultMenu();
    }

    function tileHasBomb(gx, gy) {
        return get("bomb").find((bomb) => bomb.gridX === gx && bomb.gridY === gy);
    }

    function tileBlockedForEnemy(gx, gy) {
        if (!inBounds(gx, gy)) return true;
        if (gameMap[gy][gx] === SOLID || gameMap[gy][gx] === DESTRUCTIBLE) return true;
        return Boolean(tileHasBomb(gx, gy));
    }

    function entityOccupiesTile(entity, gx, gy) {
        const entityGrid = gridFromPos(entity.pos);
        return entityGrid.x === gx && entityGrid.y === gy;
    }

    function spawnZombieOfType(spawnPos, zombieType) {
        const typeConfig = ZOMBIE_TYPES[zombieType];
        const tint = typeConfig.tint;
        const g = gridFromPos(spawnPos);
        let finalPos = spawnPos;
        outer: for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
                const nx = g.x + dx;
                const ny = g.y + dy;
                if (inBounds(nx, ny) && gameMap[ny][nx] === EMPTY) {
                    finalPos = worldPos(nx, ny);
                    break outer;
                }
            }
        }
        const depth = actorDepth(finalPos.y);
        const newZombie = add([
            sprite("zombie"),
            opacity(0),
            pos(finalPos),
            area({ shape: new Rect(vec2(3, 2), 10, 13) }),
            anchor("center"),
            z(depth),
            "zombie",
            {
                speed: Math.round(typeConfig.speed * diffConfig.zombieSpeedMult),
                zombieType,
                hp: typeConfig.hp,
                direction: choose(["left", "right", "up", "down"]),
                moveTimer: rand(0.4, 1.4),
                facing: "down",
                visualOffset: ACTOR_VISUAL_OFFSET,
                isHidden: false,
            },
        ]);
        newZombie.facing = newZombie.direction;
        createActorVisual(newZombie, "zombieAnim", "idle-down", tint);
        updateActorVisual(newZombie, false);
        totalEnemies += 1;
    }

    function defeatZombie(zombie) {
        if (!zombie.exists()) return;

        zombie.hp -= 1;
        if (zombie.hp > 0) {
            // Flash white on hit
            if (zombie.visual && zombie.visual.exists()) {
                zombie.visual.color = rgb(255, 255, 255);
                wait(0.1, () => {
                    if (zombie.exists() && zombie.visual && zombie.visual.exists()) {
                        const tc = ZOMBIE_TYPES[zombie.zombieType] ? ZOMBIE_TYPES[zombie.zombieType].tint : [255,255,255];
                        zombie.visual.color = rgb(tc[0], tc[1], tc[2]);
                    }
                });
            }
            return;
        }

        // On-death spawn
        if (zombie.zombieType === "fat") {
            spawnZombieOfType(zombie.pos, "runner");
        } else if (zombie.zombieType === "mutant") {
            spawnZombieOfType(zombie.pos, "normal");
            spawnZombieOfType(zombie.pos, "normal");
        }

        if (zombie.visual && zombie.visual.exists()) {
            destroy(zombie.visual);
        }
        playSfx("zombieDown");
        destroy(zombie);
        enemiesDefeated += 1;
    }

    function spawnExplosion(gx, gy, spriteState = { anim: "center", flipX: false, flipY: false }) {
        const exp = add([
            sprite("explosionAnim", {
                anim: spriteState.anim,
                flipX: spriteState.flipX,
                flipY: spriteState.flipY,
            }),
            pos(worldPos(gx, gy)),
            area({ shape: new Rect(vec2(-7, -7), 14, 14) }),
            anchor("center"),
            z(40),
            "explosion",
        ]);

        get("zombie").forEach((zombie) => {
            if (zombie.exists() && entityOccupiesTile(zombie, gx, gy)) {
                defeatZombie(zombie);
            }
        });

        if (player.exists() && entityOccupiesTile(player, gx, gy)) {
            playerHit();
        }

        checkWin();

        wait(0.45, () => {
            if (exp.exists()) destroy(exp);
        });
    }

    let lifeSpawnedThisPhase = false;

    function spawnPowerup(gx, gy) {
        // Life pickup: phases 2+, max 1 per phase, rare
        if (currentPhase >= 2 && !lifeSpawnedThisPhase && Math.random() < diffConfig.lifeChance) {
            lifeSpawnedThisPhase = true;
            add([
                sprite("heart"),
                pos(worldPos(gx, gy)),
                area({ shape: new Rect(vec2(-2, -2), 4, 4) }),
                anchor("center"),
                scale(1.4),
                z(12),
                "powerup",
                { powerType: POWER_LIFE },
            ]);
            return;
        }

        if (Math.random() > diffConfig.powerupChance) return;

        const kind = Math.random() < 0.5 ? POWER_BOMB : POWER_FIRE;
        add([
            sprite(kind === POWER_BOMB ? "bombPower" : "firePower"),
            pos(worldPos(gx, gy)),
            area({ shape: new Rect(vec2(-2, -2), 4, 4) }),
            anchor("center"),
            z(12),
            "powerup",
            { powerType: kind },
        ]);
    }

    function getExplosionSpriteState(dir, isEnd) {
        if (dir.x !== 0) {
            return {
                anim: isEnd ? "horizontal-end-right" : "horizontal-mid",
                flipX: dir.x < 0,
                flipY: false,
            };
        }

        return {
            anim: isEnd ? "vertical-end-down" : "vertical-mid",
            flipX: false,
            flipY: dir.y < 0,
        };
    }

    function explodeBomb(bomb) {
        if (!bomb.exists()) return;

        const { gridX, gridY, range } = bomb;
        playSfx("explosionSfx");
        destroy(bomb);

        if (player.passThroughBomb === bomb) {
            player.passThroughBomb = null;
        }

        spawnExplosion(gridX, gridY);

        const dirs = [
            { x: 1, y: 0 },
            { x: -1, y: 0 },
            { x: 0, y: 1 },
            { x: 0, y: -1 },
        ];

        dirs.forEach((dir) => {
            for (let step = 1; step <= range; step++) {
                const nx = gridX + dir.x * step;
                const ny = gridY + dir.y * step;

                if (!inBounds(nx, ny)) break;
                if (gameMap[ny][nx] === SOLID) break;

                const otherBomb = tileHasBomb(nx, ny);
                const nextX = nx + dir.x;
                const nextY = ny + dir.y;
                const isEnd = step === range
                    || gameMap[ny][nx] === DESTRUCTIBLE
                    || Boolean(otherBomb)
                    || !inBounds(nextX, nextY)
                    || gameMap[nextY][nextX] === SOLID;

                spawnExplosion(nx, ny, getExplosionSpriteState(dir, isEnd));

                if (gameMap[ny][nx] === DESTRUCTIBLE) {
                    gameMap[ny][nx] = EMPTY;
                    get("destructible").forEach((box) => {
                        if (box.gridX === nx && box.gridY === ny) {
                            destroy(box);
                            spawnPowerup(nx, ny);
                        }
                    });
                    break;
                }

                if (otherBomb) {
                    wait(0.05, () => explodeBomb(otherBomb));
                    break;
                }
            }
        });
    }

    function placeBomb() {
        if (isPaused || runEnded) return;

        const activeBombs = get("bomb");
        if (activeBombs.length >= maxBombs) return;

        const { x, y } = gridFromPos(player.pos);
        if (!inBounds(x, y) || tileHasBomb(x, y)) return;

        const bomb = add([
            sprite("bombAnim", { anim: "fuse" }),
            pos(worldPos(x, y)),
            area({ shape: new Rect(vec2(-6, -6), 12, 12) }),
            anchor("center"),
            z(18),
            "bomb",
            { gridX: x, gridY: y, range: firePower, phase: "fuse", fuseTimer: 2.35, totalTimer: 3.0 },
        ]);

        playSfx("bombPlace");
        player.passThroughBomb = bomb;
    }

    onUpdate("bomb", (bomb) => {
        if (isPaused) return;

        bomb.fuseTimer  -= dt();
        bomb.totalTimer -= dt();

        if (bomb.fuseTimer <= 0 && bomb.phase === "fuse") {
            bomb.phase = "alert";
            bomb.fuseTimer = Infinity;
            bomb.play("alert");
            playSfx("bombAlert");
        }

        if (bomb.totalTimer <= 0) {
            explodeBomb(bomb);
        }
    });

    function respawnPlayer() {
        player.pos = worldPos(1, 1);
        player.passThroughBomb = null;
        player.facing = "down";
        updateActorVisual(player, false);
    }

    onUpdate(() => {
        vNavTimer -= dt();
        if (isSlotPickerOpen) {
            if (vNavTimer <= 0) {
                if (vKeys.up)   { _pickerMove(-1); vNavTimer = 0.22; }
                if (vKeys.down) { _pickerMove(1);  vNavTimer = 0.22; }
            }
            if (virtualBombPressed)  { virtualBombPressed  = false; _pickerConfirm(); }
            if (virtualPausePressed) { virtualPausePressed = false; playSfx("uiBack"); _pickerClose(); }
            return;
        }
        if (virtualPausePressed) { virtualPausePressed = false; togglePause(); }

        if (isPaused) {
            if (vNavTimer <= 0) {
                if (vKeys.up) {
                    pauseSelection = (pauseSelection - 1 + pauseOptions.length) % pauseOptions.length;
                    playSfx("uiMove"); refreshPauseMenu(); vNavTimer = 0.22;
                } else if (vKeys.down) {
                    pauseSelection = (pauseSelection + 1) % pauseOptions.length;
                    playSfx("uiMove"); refreshPauseMenu(); vNavTimer = 0.22;
                }
            }
            if (virtualBombPressed) { virtualBombPressed = false; runPauseSelection(); }
            return;
        }

        if (runEnded) {
            if (resultOptions.length > 0 && vNavTimer <= 0) {
                if (vKeys.up) {
                    resultSelection = (resultSelection - 1 + resultOptions.length) % resultOptions.length;
                    playSfx("uiMove"); refreshResultMenu(); vNavTimer = 0.22;
                } else if (vKeys.down) {
                    resultSelection = (resultSelection + 1) % resultOptions.length;
                    playSfx("uiMove"); refreshResultMenu(); vNavTimer = 0.22;
                }
            }
            if (virtualBombPressed && resultOptions.length > 0) { virtualBombPressed = false; runResultSelection(); }
            return;
        }

        if (player.passThroughBomb) {
            if (!player.passThroughBomb.exists()) {
                player.passThroughBomb = null;
            } else {
                const currentGrid = gridFromPos(player.pos);
                if (currentGrid.x !== player.passThroughBomb.gridX || currentGrid.y !== player.passThroughBomb.gridY) {
                    player.passThroughBomb = null;
                }
            }
        }

        let dirX = 0;
        let dirY = 0;

        if      (isKeyDown("left")  || isKeyDown("a") || vKeys.left)  dirX = -1;
        else if (isKeyDown("right") || isKeyDown("d") || vKeys.right) dirX =  1;
        else if (isKeyDown("up")    || isKeyDown("w") || vKeys.up)    dirY = -1;
        else if (isKeyDown("down")  || isKeyDown("s") || vKeys.down)  dirY =  1;

        let isMoving = false;

        if (dirX !== 0 || dirY !== 0) {
            if (dirX < 0) player.facing = "left";
            else if (dirX > 0) player.facing = "right";
            else if (dirY < 0) player.facing = "up";
            else if (dirY > 0) player.facing = "down";

            const currentGrid = gridFromPos(player.pos);
            const nextGridX = currentGrid.x + dirX;
            const nextGridY = currentGrid.y + dirY;
            const bombOnNext = tileHasBomb(nextGridX, nextGridY);
            const canCrossBomb = bombOnNext && player.passThroughBomb === bombOnNext;

            if (!bombOnNext || canCrossBomb) {
                player.move(dirX * player.speed, dirY * player.speed);
                isMoving = true;
            }
        }

        updateActorVisual(player, isMoving);

        if (virtualBombPressed) { virtualBombPressed = false; placeBomb(); }
    });

    const zombieTypeList = [];
    for (const group of phaseConfig.zombies) {
        for (let i = 0; i < group.count; i++) zombieTypeList.push(group.type);
    }
    const savedDefeated = _startStats.enemiesDefeated || 0;
    if (savedDefeated > 0) zombieTypeList.splice(zombieTypeList.length - savedDefeated, savedDefeated);

    const spawnCandidates = [
        { x: MAP_WIDTH - 3, y: MAP_HEIGHT - 3 },
        { x: MAP_WIDTH - 3, y: 3 },
        { x: 3, y: MAP_HEIGHT - 3 },
        { x: 3, y: 3 },
        { x: MAP_WIDTH - 3, y: Math.floor(MAP_HEIGHT / 2) },
        { x: 3, y: Math.floor(MAP_HEIGHT / 2) },
        { x: Math.floor(MAP_WIDTH / 2), y: MAP_HEIGHT - 3 },
    ];

    const zombieSpawns = [];
    for (const origin of spawnCandidates) {
        if (zombieSpawns.length >= zombieTypeList.length) break;
        let placed = false;
        for (let dy = -1; dy <= 1 && !placed; dy++) {
            for (let dx = -1; dx <= 1 && !placed; dx++) {
                const x = origin.x + dx;
                const y = origin.y + dy;
                if (inBounds(x, y) && gameMap[y][x] === EMPTY) {
                    zombieSpawns.push({ x, y });
                    placed = true;
                }
            }
        }
    }

    zombieSpawns.forEach((spawn, index) => {
        const zombieType = zombieTypeList[index] || "normal";
        const typeConfig = ZOMBIE_TYPES[zombieType];
        const tint = typeConfig.tint;

        const zombie = add([
            sprite("zombie"),
            opacity(0),
            pos(worldPos(spawn.x, spawn.y)),
            area({ shape: new Rect(vec2(3, 2), 10, 13) }),
            anchor("center"),
            z(actorDepth(worldPos(spawn.x, spawn.y).y)),
            "zombie",
            {
                speed: Math.round(typeConfig.speed * diffConfig.zombieSpeedMult),
                zombieType,
                hp: typeConfig.hp,
                direction: choose(["left", "right", "up", "down"]),
                moveTimer: rand(0.4, 1.4),
                facing: "down",
                visualOffset: ACTOR_VISUAL_OFFSET,
                isHidden: false,
            },
        ]);

        zombie.facing = zombie.direction;
        createActorVisual(zombie, "zombieAnim", "idle-down", tint);
        updateActorVisual(zombie, false);
    });
    totalEnemies = zombieSpawns.length;

    function chooseOpenDirection(zombie) {
        const current = gridFromPos(zombie.pos);
        const options = [
            { name: "left", x: -1, y: 0 },
            { name: "right", x: 1, y: 0 },
            { name: "up", x: 0, y: -1 },
            { name: "down", x: 0, y: 1 },
        ].filter((dir) => !tileBlockedForEnemy(current.x + dir.x, current.y + dir.y));

        if (options.length > 0) {
            zombie.direction = choose(options).name;
        }
    }

    onUpdate("zombie", (zombie) => {
        if (isPaused || runEnded) return;

        // Runner: line-of-sight chase behaviour
        if (zombie.zombieType === "runner" && player.exists()) {
            const zg = gridFromPos(zombie.pos);
            const pg = gridFromPos(player.pos);
            let chaseDir = null;

            if (zg.y === pg.y && zg.x !== pg.x) {
                const step = pg.x > zg.x ? 1 : -1;
                let blocked = false;
                for (let x = zg.x + step; x !== pg.x; x += step) {
                    if (gameMap[zg.y][x] >= SOLID) { blocked = true; break; }
                }
                if (!blocked) chaseDir = step > 0 ? "right" : "left";
            } else if (zg.x === pg.x && zg.y !== pg.y) {
                const step = pg.y > zg.y ? 1 : -1;
                let blocked = false;
                for (let y = zg.y + step; y !== pg.y; y += step) {
                    if (gameMap[y][zg.x] >= SOLID) { blocked = true; break; }
                }
                if (!blocked) chaseDir = step > 0 ? "down" : "up";
            }

            if (chaseDir) {
                zombie.direction = chaseDir;
                zombie.moveTimer = rand(0.5, 1.6);
            }
        }

        zombie.moveTimer -= dt();
        if (zombie.moveTimer <= 0) {
            zombie.moveTimer = rand(0.5, 1.6);
            if (Math.random() < 0.55) {
                chooseOpenDirection(zombie);
            }
        }

        let dir = { x: 0, y: 0 };
        if (zombie.direction === "left") dir = { x: -1, y: 0 };
        if (zombie.direction === "right") dir = { x: 1, y: 0 };
        if (zombie.direction === "up") dir = { x: 0, y: -1 };
        if (zombie.direction === "down") dir = { x: 0, y: 1 };
        zombie.facing = zombie.direction;

        const laneGrid = gridFromPos(zombie.pos);
        const laneCenter = worldPos(laneGrid.x, laneGrid.y);
        if (dir.x !== 0) {
            zombie.pos.y += (laneCenter.y - zombie.pos.y) * 0.35;
            if (Math.abs(zombie.pos.y - laneCenter.y) < 0.2) {
                zombie.pos.y = laneCenter.y;
            }
        }
        if (dir.y !== 0) {
            zombie.pos.x += (laneCenter.x - zombie.pos.x) * 0.35;
            if (Math.abs(zombie.pos.x - laneCenter.x) < 0.2) {
                zombie.pos.x = laneCenter.x;
            }
        }

        const nextPos = zombie.pos.add(vec2(dir.x * zombie.speed * dt(), dir.y * zombie.speed * dt()));
        const currentGrid = gridFromPos(zombie.pos);
        const nextGrid = gridFromPos(nextPos);

        if ((nextGrid.x !== currentGrid.x || nextGrid.y !== currentGrid.y) && tileBlockedForEnemy(nextGrid.x, nextGrid.y)) {
            chooseOpenDirection(zombie);
            zombie.facing = zombie.direction;
            updateActorVisual(zombie, false);
            return;
        }

        zombie.pos = nextPos;
        updateActorVisual(zombie, true);
    });

    player.onCollide("powerup", (powerup) => {
        if (powerup.powerType === POWER_LIFE) {
            if (lives < START_LIVES) {
                lives += 1;
                updateHearts();
                showToast("+ Vida!", [240, 100, 120]);
            } else {
                showToast("Vida cheia!", [240, 100, 120]);
            }
        } else if (powerup.powerType === POWER_BOMB) {
            maxBombs += 1;
            updateStats();
            showToast("+ Carga", [239, 215, 159]);
        } else {
            firePower += 1;
            updateStats();
            showToast("+ Alcance", [255, 168, 87]);
        }
        playSfx("pickupSfx");
        destroy(powerup);
    });

    function endRun(message, tint, restartDelay) {
        if (runEnded) return;
        if (message === "OPERACAO FALHOU") {
            playSfx("failureSfx");
        }
        openResultScreen(message, tint, "Escolha sua proxima acao", []);
    }

    function showVictorySummary() {
        if (runEnded) return;
        playSfx("victorySfx");

        const lines = [
            `Tempo: ${formatBattleTime(Date.now() - battleStartedAt)}`,
            `Ferimentos: ${START_LIVES - lives}`,
            `Zumbis eliminados: ${enemiesDefeated}/${totalEnemies}`,
        ];

        if (currentPhase < 5) {
            const nextNum = currentPhase + 1;
            saveProgress(nextNum, lives, maxBombs, firePower);
            openResultScreen(
                `FASE ${currentPhase} CONCLUIDA`, [236, 208, 122],
                phaseConfig.name, lines,
                [
                    { label: `PROXIMA FASE (${nextNum}/5)`, action: () => {
                        currentPhase = nextNum;
                        carryOverStats = { lives, maxBombs, firePower };
                        go("game");
                    }},
                    { label: "Tela inicial", action: () => { currentPhase = 1; carryOverStats = null; go("menu"); } },
                ]
            );
        } else {
            openResultScreen(
                "AREA LIMPA", [236, 208, 122], "Fase 5 concluida!", lines,
                [
                    { label: "ENFRENTAR O CHEFAO", action: () => {
                        carryOverStats = { lives, maxBombs, firePower };
                        go("boss");
                    }},
                    { label: "Tela inicial", action: () => { currentPhase = 1; carryOverStats = null; go("menu"); } },
                ]
            );
        }
    }

    function playerHit() {
        if (isPaused || isInvincible || runEnded) return;

        lives -= 1;
        updateHearts();
        playSfx("playerHitSfx");

        if (lives <= 0) {
            endRun("OPERACAO FALHOU", [219, 76, 98], 2);
            return;
        }

        isInvincible = true;
        setActorHidden(player, true);
        showToast("Mordida!", [219, 76, 98]);

        wait(0.7, () => {
            respawnPlayer();
            setActorHidden(player, false);

            let flashes = 0;
            const blink = setInterval(() => {
                setActorHidden(player, !player.isHidden);
                flashes += 1;
                if (flashes >= 10) {
                    clearInterval(blink);
                    setActorHidden(player, false);
                    isInvincible = false;
                }
            }, 100);
        });
    }

    function checkWin() {
        if (runEnded) return;
        if (get("zombie").length === 0) {
            showVictorySummary();
        }
    }

    player.onCollide("zombie", () => playerHit());

    function clearPauseUI() {
        clearTag("pauseUI");
        pauseButtons = [];
        pauseLabels = [];
        pauseSoundIcon = null;
        pauseSoundBtn = null;
        pauseSoundText = null;
    }

    function refreshPauseMenu() {
        pauseButtons.forEach((button, index) => {
            button.use(sprite(index === pauseSelection ? "menuButtonActive" : "menuButton"));
            pauseLabels[index].color = index === pauseSelection ? rgb(240, 244, 236) : rgb(196, 173, 186);
        });
        if (pauseSoundBtn) {
            pauseSoundBtn.use(sprite(pauseSelection === 4 ? "menuButtonActive" : "menuButton"));
            pauseSoundIcon.use(sprite(audioMuted ? "soundOff" : "soundOn"));
            const label = audioMuted ? "DESLIGADO" : "LIGADO";
            pauseSoundText.text = label;
            const isSelected = pauseSelection === 4;
            pauseSoundText.color = isSelected ? rgb(240, 244, 236) : rgb(196, 173, 186);
            pauseSoundIcon.color = isSelected ? rgb(240, 244, 236) : rgb(160, 170, 166);
        }
    }

    function closePause() {
        isPaused = false;
        clearPauseUI();
    }

    function runPauseSelection() {
        playSfx("uiConfirm");
        pauseOptions[pauseSelection].action();
    }

    function openPause() {
        isPaused = true;
        clearPauseUI();

        const cx = width() / 2;
        const cy = height() / 2;

        add([rect(width(), height()), pos(0, 0), color(0, 0, 0), opacity(0.62), fixed(), z(130), "pauseUI"]);
        add([sprite("pausePanel"), pos(cx, cy), anchor("center"), fixed(), z(131), "pauseUI"]);
        add([text("OPERACAO PAUSADA", { size: 16 }), pos(cx, cy - 72), anchor("center"), color(236, 208, 122), fixed(), z(132), "pauseUI"]);
        add([text("Escolha sua proxima acao", { size: 9 }), pos(cx, cy - 56), anchor("center"), color(182, 194, 188), fixed(), z(132), "pauseUI"]);

        pauseSelection = 0;
        // 4 action buttons (indices 0-3), starting at cy-40, spacing 28px
        const actionYStart = cy - 40;
        for (let i = 0; i < 4; i++) {
            const y = actionYStart + i * 28;
            const option = pauseOptions[i];
            const button = add([sprite(i === 0 ? "menuButtonActive" : "menuButton"), pos(cx, y), anchor("center"), fixed(), z(132), "pauseUI"]);
            const label = add([text(option.label, { size: 10 }), pos(cx, y + 1), anchor("center"), color(i === 0 ? 240 : 196, i === 0 ? 244 : 173, i === 0 ? 236 : 186), fixed(), z(133), "pauseUI"]);
            pauseButtons.push(button);
            pauseLabels.push(label);
        }

        // Separator
        add([rect(196, 1), pos(cx, cy + 58), anchor("center"), color(74, 86, 80), fixed(), z(132), "pauseUI"]);

        // Sound toggle (index 4) — button with speaker icon
        pauseSoundBtn = add([sprite("menuButton"), pos(cx, cy + 72), anchor("center"), fixed(), z(132), "pauseUI"]);
        pauseSoundIcon = add([sprite(audioMuted ? "soundOff" : "soundOn"), pos(cx - 50, cy + 72), anchor("center"), scale(0.8), fixed(), z(133), "pauseUI"]);
        pauseSoundText = add([text(audioMuted ? "DESLIGADO" : "LIGADO", { size: 9 }), pos(cx + 4, cy + 73), anchor("center"), color(196, 173, 186), fixed(), z(133), "pauseUI"]);

        refreshPauseMenu();
    }

    function togglePause() {
        if (get("resultUI").length > 0) return;

        if (isPaused) {
            playSfx("pauseToggle");
            closePause();
        } else {
            playSfx("pauseToggle");
            openPause();
        }
    }

    onKeyPress("space", placeBomb);
    onKeyPress("z", placeBomb);
    onKeyPress("up", () => {
        if (isSlotPickerOpen) { _pickerMove(-1); return; }
        if (isPaused) { pauseSelection = (pauseSelection - 1 + pauseOptions.length) % pauseOptions.length; playSfx("uiMove"); refreshPauseMenu(); return; }
        if (runEnded && resultOptions.length > 0) { resultSelection = (resultSelection - 1 + resultOptions.length) % resultOptions.length; playSfx("uiMove"); refreshResultMenu(); }
    });
    onKeyPress("down", () => {
        if (isSlotPickerOpen) { _pickerMove(1); return; }
        if (isPaused) { pauseSelection = (pauseSelection + 1) % pauseOptions.length; playSfx("uiMove"); refreshPauseMenu(); return; }
        if (runEnded && resultOptions.length > 0) { resultSelection = (resultSelection + 1) % resultOptions.length; playSfx("uiMove"); refreshResultMenu(); }
    });
    onKeyPress("enter", () => {
        if (isSlotPickerOpen) { _pickerConfirm(); return; }
        if (isPaused) { runPauseSelection(); return; }
        if (runEnded && resultOptions.length > 0) { runResultSelection(); }
    });
    onKeyPress("x", () => {
        if (isSlotPickerOpen) { playSfx("uiBack"); _pickerClose(); return; }
        placeBomb();
    });
    onKeyPress("t", toggleMute);
    onKeyPress("escape", () => { if (isSlotPickerOpen) { playSfx("uiBack"); _pickerClose(); return; } togglePause(); });
    onKeyPress("p",      () => { if (isSlotPickerOpen) { playSfx("uiBack"); _pickerClose(); return; } togglePause(); });
    onKeyPress("r", () => {
        if (isPaused || (runEnded && resultOptions.length > 0)) {
            playSfx("uiConfirm");
            go("game");
        }
    });
    onKeyPress("m", () => {
        if (isPaused || (runEnded && resultOptions.length > 0)) {
            playSfx("uiBack");
            go("menu");
        }
    });

    updateHearts();
    updateStats();
});

// ── Boss Scene ──────────────────────────────────────────────────────
scene("boss", () => {
    const _bossDiffConfig = DIFFICULTIES[selectedDifficulty];
    const _bossStartStats = carryOverStats || { lives: START_LIVES, maxBombs: _bossDiffConfig.startBombs, firePower: _bossDiffConfig.startFire };

    setSceneAudio({
        music:    { name: "streetTheme",    volume: 0.32, speed: 1.22, detune: 700 },
        ambience: { name: "streetAmbience", volume: 0.18, speed: 1.22, detune: 700 },
    });

    // Open arena: only fixed walls, no destructible boxes
    gameMap = [];
    for (let y = 0; y < MAP_HEIGHT; y++) {
        gameMap[y] = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (x === 0 || y === 0 || x === MAP_WIDTH - 1 || y === MAP_HEIGHT - 1) {
                gameMap[y][x] = SOLID;
            } else if (x % 2 === 0 && y % 2 === 0) {
                gameMap[y][x] = SOLID;
            } else {
                gameMap[y][x] = EMPTY;
            }
        }
    }

    virtualBombPressed  = false;
    virtualPausePressed = false;
    Object.keys(vKeys).forEach((k) => { vKeys[k] = false; });

    let bossLives = _bossStartStats.lives;
    let maxBombs = _bossStartStats.maxBombs;
    let firePower = _bossStartStats.firePower;
    let isPaused = false;
    let isInvincible = false;
    let runEnded = false;
    const battleStartedAt = Date.now();
    let resultSelection = 0;
    let resultButtons = [];
    let resultLabels = [];
    let resultOptions = [];
    let pauseSelection = 0;
    let pauseButtons = [];
    let pauseLabels = [];
    let vNavTimer = 0;

    add([sprite("bunkerBackdrop"), pos(0, 0)]);
    add([sprite("hudPanel"), pos(0, 0), fixed(), z(100)]);

    // Render tiles (bunker theme for boss arena)
    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) {
            add([sprite("floor5"), pos(x * TILE_SIZE, MAP_OFFSET_Y + y * TILE_SIZE), z(1)]);
            if (gameMap[y][x] === SOLID) {
                add([sprite("wall5"), pos(x * TILE_SIZE, MAP_OFFSET_Y + y * TILE_SIZE), area(), body({ isStatic: true }), z(5), "wall"]);
            }
        }
    }

    // HUD title — center of boss HP box in hudPanel: x=72 + 146/2 = 145
    const BOSS_HUD_CX = 145;
    add([text(`CHEFAO`, { size: 8 }), pos(BOSS_HUD_CX, 8), anchor("center"), color(255, 100, 80), fixed(), z(101)]);

    // Hearts (left)
    const hearts = [];
    for (let i = 0; i < START_LIVES; i++) {
        hearts.push(add([sprite("heart"), pos(18 + i * 15, 24), anchor("center"), scale(1.3), fixed(), z(101)]));
    }
    function updateHearts() {
        hearts.forEach((h, i) => h.use(sprite(i < bossLives ? "heart" : "heartEmpty")));
    }

    // Boss HP bar (center of boss HP box)
    const BOSS_MAX_HP = { easy: 8, medium: 12, hard: 16 }[selectedDifficulty] ?? 12;
    let bossHp = BOSS_MAX_HP;
    const HP_BAR_W = 126;
    add([rect(HP_BAR_W, 10), pos(BOSS_HUD_CX, 24), color(50, 30, 30), anchor("center"), fixed(), z(101)]);
    const bossHpFill = add([rect(HP_BAR_W, 10), pos(BOSS_HUD_CX, 24), color(220, 70, 60), anchor("center"), fixed(), z(102)]);
    const bossHpText = add([text(`${BOSS_MAX_HP}/${BOSS_MAX_HP}`, { size: 7 }), pos(BOSS_HUD_CX, 24), anchor("center"), color(255, 255, 255), fixed(), z(103)]);

    function updateBossHpBar() {
        bossHp = boss.hp;
        bossHpFill.width = Math.max(0, HP_BAR_W * bossHp / BOSS_MAX_HP);
        bossHpFill.color = bossHp <= BOSS_MAX_HP * 0.33 ? rgb(255, 80, 40) : bossHp <= BOSS_MAX_HP * 0.66 ? rgb(230, 140, 50) : rgb(220, 70, 60);
        bossHpText.text = `${Math.max(0, bossHp)}/${BOSS_MAX_HP}`;
    }

    add([text("ESC PAUSA", { size: 8 }), pos(width() - 8, 12), anchor("right"), color(182, 194, 188), fixed(), z(101)]);

    // Bomb/fire stats — below "ESC PAUSA" (right side)
    add([sprite("bombPower"), pos(254, 24), anchor("center"), scale(0.9), fixed(), z(101)]);
    const bombCountText = add([text(`${maxBombs}`, { size: 9 }), pos(262, 24), anchor("left"), color(239, 215, 159), fixed(), z(101)]);
    add([sprite("firePower"), pos(278, 24), anchor("center"), scale(0.9), fixed(), z(101)]);
    const fireCountText = add([text(`${firePower}`, { size: 9 }), pos(286, 24), anchor("left"), color(239, 195, 120), fixed(), z(101)]);

    function updateStats() {
        bombCountText.text = `${maxBombs}`;
        fireCountText.text = `${firePower}`;
    }

    function formatBattleTime(ms) {
        const s = Math.max(0, Math.floor(ms / 1000));
        return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
    }

    // ── Player ──
    const player = add([
        sprite("player"), opacity(0), pos(worldPos(1, 1)),
        area({ shape: new Rect(vec2(3, 2), 10, 13) }), body(), anchor("center"),
        z(actorDepth(worldPos(1, 1).y)), "player",
        { speed: DIFFICULTIES[selectedDifficulty].playerSpeed, passThroughBomb: null, facing: "down", visualOffset: ACTOR_VISUAL_OFFSET, isHidden: false },
    ]);

    function syncActorVisual(actor) {
        if (!actor.visual || !actor.visual.exists()) return;
        actor.visual.pos = actor.pos.add(actor.visualOffset);
        actor.visual.z = actorDepth(actor.pos.y);
        actor.visual.hidden = actor.isHidden;
    }
    function setActorHidden(actor, hidden) {
        actor.isHidden = hidden;
        if (actor.visual && actor.visual.exists()) actor.visual.hidden = hidden;
    }
    function playActorAnim(actor, animName, flipX = false) {
        if (!actor.visual || !actor.visual.exists()) return;
        if (actor.visual.animName !== animName) { actor.visual.play(animName); actor.visual.animName = animName; }
        actor.visual.flipX = flipX;
    }
    function updateActorVisual(actor, moving) {
        let animName = "idle-down", flipX = false;
        if (actor.facing === "left")       { animName = moving ? "walk-side" : "idle-side"; flipX = true; }
        else if (actor.facing === "right") { animName = moving ? "walk-side" : "idle-side"; }
        else if (actor.facing === "up")    { animName = moving ? "walk-up"   : "idle-up"; }
        else                               { animName = moving ? "walk-down" : "idle-down"; }
        playActorAnim(actor, animName, flipX);
        syncActorVisual(actor);
    }

    const playerVisualComps = [
        sprite("playerAnim", { anim: "idle-down" }),
        pos(player.pos.add(player.visualOffset)),
        anchor("center"),
        z(actorDepth(player.pos.y)),
    ];
    player.visual = add(playerVisualComps);
    player.visual.animName = "idle-down";
    player.visual.hidden = false;
    syncActorVisual(player);

    // ── Bomb helpers ──
    function tileHasBomb(gx, gy) {
        return get("bomb").find((b) => b.gridX === gx && b.gridY === gy);
    }
    function tileBlockedForEnemy(gx, gy) {
        if (!inBounds(gx, gy)) return true;
        if (gameMap[gy][gx] === SOLID || gameMap[gy][gx] === DESTRUCTIBLE) return true;
        return Boolean(tileHasBomb(gx, gy));
    }
    function entityOccupiesTile(entity, gx, gy) {
        const g = gridFromPos(entity.pos);
        return g.x === gx && g.y === gy;
    }
    function getExplosionSpriteState(dir, isEnd) {
        if (dir.x !== 0) return { anim: isEnd ? "horizontal-end-right" : "horizontal-mid", flipX: dir.x < 0, flipY: false };
        return { anim: isEnd ? "vertical-end-down" : "vertical-mid", flipX: false, flipY: dir.y < 0 };
    }

    function showToast(message, tint) {
        const t = add([text(message, { size: 14 }), pos(width() / 2, 56), anchor("center"), color(tint[0], tint[1], tint[2]), fixed(), z(140), move(UP, 16), opacity(1), "toast"]);
        wait(0.7, () => { if (t.exists()) destroy(t); });
    }

    // ── Minions (spawned by boss) ──
    function spawnMinion(spawnPos) {
        const g = gridFromPos(spawnPos);
        let finalPos = spawnPos;
        outer: for (let dy = -2; dy <= 2; dy++) {
            for (let dx = -2; dx <= 2; dx++) {
                const nx = g.x + dx, ny = g.y + dy;
                if (inBounds(nx, ny) && gameMap[ny][nx] === EMPTY) { finalPos = worldPos(nx, ny); break outer; }
            }
        }
        const minionSpeed = Math.round(42 * DIFFICULTIES[selectedDifficulty].zombieSpeedMult);
        const m = add([
            sprite("zombie"), opacity(0), pos(finalPos),
            area({ shape: new Rect(vec2(3, 2), 10, 13) }), anchor("center"),
            z(actorDepth(finalPos.y)), "minion",
            { speed: minionSpeed, direction: choose(["left","right","up","down"]), moveTimer: rand(0.4,1.4), facing: "down", visualOffset: ACTOR_VISUAL_OFFSET, isHidden: false },
        ]);
        m.facing = m.direction;
        const mv = add([sprite("zombieAnim", { anim: "idle-down" }), pos(m.pos.add(m.visualOffset)), anchor("center"), z(actorDepth(m.pos.y))]);
        mv.animName = "idle-down"; m.visual = mv;
    }

    onUpdate("minion", (m) => {
        if (isPaused || runEnded) return;
        m.moveTimer -= dt();
        if (m.moveTimer <= 0) {
            m.moveTimer = rand(0.5, 1.6);
            const g = gridFromPos(m.pos);
            const opts = [{name:"left",x:-1,y:0},{name:"right",x:1,y:0},{name:"up",x:0,y:-1},{name:"down",x:0,y:1}]
                .filter(d => !tileBlockedForEnemy(g.x+d.x, g.y+d.y));
            if (opts.length > 0) m.direction = choose(opts).name;
        }
        let dx = 0, dy = 0;
        if (m.direction === "left") dx = -1; if (m.direction === "right") dx = 1;
        if (m.direction === "up")   dy = -1; if (m.direction === "down")  dy = 1;
        m.facing = m.direction;
        const g = gridFromPos(m.pos);
        const lc = worldPos(g.x, g.y);
        if (dx !== 0) m.pos.y += (lc.y - m.pos.y) * 0.35;
        if (dy !== 0) m.pos.x += (lc.x - m.pos.x) * 0.35;
        const np = m.pos.add(vec2(dx * m.speed * dt(), dy * m.speed * dt()));
        const ng = gridFromPos(np);
        if ((ng.x !== g.x || ng.y !== g.y) && tileBlockedForEnemy(ng.x, ng.y)) return;
        m.pos = np;
        if (m.visual?.exists()) {
            let an = "idle-down", fx = false;
            if (m.facing==="left") { an="walk-side"; fx=true; } else if(m.facing==="right") an="walk-side";
            else if(m.facing==="up") an="walk-up"; else an="walk-down";
            if (m.visual.animName !== an) { m.visual.play(an); m.visual.animName = an; }
            m.visual.flipX = fx;
            m.visual.pos = m.pos.add(m.visualOffset);
            m.visual.z = actorDepth(m.pos.y);
        }
    });

    // ── Boss entity ──
    const BOSS_SPEED_PATROL = 36;
    const BOSS_SPEED_CHARGE = 164;
    const bossSpawn = worldPos(Math.floor(MAP_WIDTH / 2), Math.floor(MAP_HEIGHT / 2));
    const boss = add([
        sprite("zombie"), opacity(0), pos(bossSpawn),
        area({ shape: new Rect(vec2(-12, -10), 24, 24) }),
        anchor("center"), z(actorDepth(bossSpawn.y)), "boss",
        {
            hp: BOSS_MAX_HP,
            iframes: 0,
            state: "patrol",        // patrol | charge | stomp | dead
            stateTimer: rand(2, 4),
            chargeDir: vec2(0, 0),
            chargeCooldown: 0,
            stompCooldown: 0,
            summonDone: false,
            direction: "down",
            visualOffset: vec2(0, -10),
            isHidden: false,
            speed: BOSS_SPEED_PATROL,
        },
    ]);
    const bossVisual = add([
        sprite("zombieAnim", { anim: "walk-down" }),
        pos(boss.pos.add(boss.visualOffset)),
        anchor("center"),
        scale(2),
        color(210, 130, 60),
        z(actorDepth(boss.pos.y) + 1),
    ]);
    bossVisual.animName = "walk-down";
    boss.visual = bossVisual;

    function bossHit() {
        if (boss.state === "dead" || boss.iframes > 0) return;
        boss.iframes = 0.9;
        boss.hp -= 1;
        updateBossHpBar();
        bossVisual.color = rgb(255, 255, 255);
        wait(0.12, () => { if (boss.exists() && bossVisual.exists()) bossVisual.color = rgb(210, 130, 60); });

        // Summon minions at 2 HP
        if (boss.hp <= 2 && !boss.summonDone) {
            boss.summonDone = true;
            for (let i = 0; i < 3; i++) spawnMinion(boss.pos);
            showToast("Reforcos chegaram!", [255, 160, 60]);
        }

        if (boss.hp <= 0) {
            boss.state = "dead";
            if (bossVisual.exists()) { bossVisual.play("death"); bossVisual.animName = "death"; }
            wait(1.0, () => {
                if (!runEnded) {
                    runEnded = true;
                    playSfx("victorySfx");
                    campaignElapsedMs = Date.now() - battleStartedAt;
                    go("ending");
                }
            });
        }
    }

    // ── Explosion / Bomb (copied from game scene) ──
    function spawnExplosion(gx, gy, spriteState = { anim: "center", flipX: false, flipY: false }, fromBoss = false) {
        const exp = add([
            sprite("explosionAnim", { anim: spriteState.anim, flipX: spriteState.flipX, flipY: spriteState.flipY }),
            pos(worldPos(gx, gy)), area({ shape: new Rect(vec2(-7, -7), 14, 14) }), anchor("center"), z(40), "explosion",
        ]);
        // Hit boss (check 3x3 area around boss center) — skip self-damage from boss stomp
        if (!fromBoss && boss.exists() && boss.state !== "dead") {
            const bg = gridFromPos(boss.pos);
            if (Math.abs(bg.x - gx) <= 1 && Math.abs(bg.y - gy) <= 1) bossHit();
        }
        // Hit minions
        get("minion").forEach((m) => {
            if (m.exists() && entityOccupiesTile(m, gx, gy)) {
                if (m.visual?.exists()) destroy(m.visual);
                playSfx("zombieDown");
                destroy(m);
            }
        });
        if (player.exists() && entityOccupiesTile(player, gx, gy)) playerHit();
        wait(0.45, () => { if (exp.exists()) destroy(exp); });
    }

    function explodeBomb(bomb) {
        if (!bomb.exists()) return;
        const { gridX, gridY, range } = bomb;
        playSfx("explosionSfx");
        destroy(bomb);
        if (player.passThroughBomb === bomb) player.passThroughBomb = null;
        spawnExplosion(gridX, gridY);
        const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
        dirs.forEach((dir) => {
            for (let step = 1; step <= range; step++) {
                const nx = gridX + dir.x * step, ny = gridY + dir.y * step;
                if (!inBounds(nx, ny) || gameMap[ny][nx] === SOLID) break;
                const ob = tileHasBomb(nx, ny);
                const nx2 = nx + dir.x, ny2 = ny + dir.y;
                const isEnd = step === range || gameMap[ny][nx] === DESTRUCTIBLE || Boolean(ob) || !inBounds(nx2,ny2) || gameMap[ny2][nx2] === SOLID;
                spawnExplosion(nx, ny, getExplosionSpriteState(dir, isEnd));
                if (gameMap[ny][nx] === DESTRUCTIBLE) { gameMap[ny][nx] = EMPTY; break; }
                if (ob) { wait(0.05, () => explodeBomb(ob)); break; }
            }
        });
    }

    function placeBomb() {
        if (isPaused || runEnded) return;
        if (get("bomb").length >= maxBombs) return;
        const { x, y } = gridFromPos(player.pos);
        if (!inBounds(x, y) || tileHasBomb(x, y)) return;
        const bomb = add([
            sprite("bombAnim", { anim: "fuse" }), pos(worldPos(x, y)),
            area({ shape: new Rect(vec2(-6,-6),12,12) }), anchor("center"), z(18), "bomb",
            { gridX: x, gridY: y, range: firePower, phase: "fuse", fuseTimer: 2.35, totalTimer: 3.0 },
        ]);
        playSfx("bombPlace");
        player.passThroughBomb = bomb;
    }

    onUpdate("bomb", (bomb) => {
        if (isPaused) return;
        bomb.fuseTimer -= dt(); bomb.totalTimer -= dt();
        if (bomb.fuseTimer <= 0 && bomb.phase === "fuse") {
            bomb.phase = "alert"; bomb.fuseTimer = Infinity; bomb.play("alert"); playSfx("bombAlert");
        }
        if (bomb.totalTimer <= 0) explodeBomb(bomb);
    });

    // ── Boss AI update ──
    onUpdate("boss", (b) => {
        if (isPaused || runEnded || b.state === "dead") return;

        b.iframes = Math.max(0, b.iframes - dt());
        b.stateTimer -= dt();
        b.chargeCooldown = Math.max(0, b.chargeCooldown - dt());
        b.stompCooldown  = Math.max(0, b.stompCooldown  - dt());

        if (b.state === "patrol") {
            if (b.chargeCooldown <= 0 && b.stateTimer <= 0 && player.exists()) {
                // Switch to charge
                const dp = player.pos.sub(b.pos);
                b.chargeDir = dp.len() > 0 ? dp.unit() : vec2(1, 0);
                b.state = "charge";
                b.stateTimer = 0.9;
                b.chargeCooldown = 6;
                b.speed = BOSS_SPEED_CHARGE;
                showToast("CARGA!", [255, 80, 60]);
            } else if (b.stateTimer <= 0) {
                b.stateTimer = rand(2.5, 4.5);
                const g = gridFromPos(b.pos);
                const opts = [{name:"left",x:-1,y:0},{name:"right",x:1,y:0},{name:"up",x:0,y:-1},{name:"down",x:0,y:1}]
                    .filter(d => !tileBlockedForEnemy(g.x+d.x, g.y+d.y));
                if (opts.length > 0) {
                    const d = choose(opts);
                    b.direction = d.name;
                    b.chargeDir = vec2(d.x, d.y);
                }
            }

            const g = gridFromPos(b.pos);
            const np = b.pos.add(b.chargeDir.scale(b.speed * dt()));
            const ng = gridFromPos(np);
            if ((ng.x !== g.x || ng.y !== g.y) && tileBlockedForEnemy(ng.x, ng.y)) {
                b.stateTimer = 0; // pick new direction next frame
            } else {
                b.pos = np;
            }

            // Stomp check
            if (b.stompCooldown <= 0) {
                b.state = "stomp";
                b.stateTimer = 0.5;
                b.stompCooldown = 8;
            }
        } else if (b.state === "charge") {
            const g = gridFromPos(b.pos);
            const np = b.pos.add(b.chargeDir.scale(b.speed * dt()));
            const ng = gridFromPos(np);
            if ((ng.x !== g.x || ng.y !== g.y) && tileBlockedForEnemy(ng.x, ng.y)) {
                b.state = "patrol";
                b.stateTimer = rand(2.5, 4.5);
                b.speed = BOSS_SPEED_PATROL;
            } else {
                b.pos = np;
            }
            if (b.stateTimer <= 0) {
                b.state = "patrol";
                b.stateTimer = rand(2.5, 4.5);
                b.speed = BOSS_SPEED_PATROL;
            }
        } else if (b.state === "stomp") {
            if (b.stateTimer <= 0) {
                // Spawn small explosions around boss
                const bg = gridFromPos(b.pos);
                [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy]) => {
                    const nx = bg.x + dx, ny = bg.y + dy;
                    if (inBounds(nx, ny) && gameMap[ny][nx] !== SOLID) {
                        spawnExplosion(nx, ny, { anim: "center", flipX: false, flipY: false }, true);
                    }
                });
                b.state = "patrol";
                b.stateTimer = rand(2.5, 4.5);
                b.speed = BOSS_SPEED_PATROL;
                b.chargeDir = vec2(1, 0);
            }
        }

        // Sync visual
        if (bossVisual.exists()) {
            bossVisual.pos = b.pos.add(b.visualOffset);
            bossVisual.z = actorDepth(b.pos.y) + 1;
            if (b.state !== "dead") {
                const moving = b.state === "charge" || b.state === "patrol";
                let an = "walk-down";
                const cd = b.chargeDir;
                if (Math.abs(cd.x) > Math.abs(cd.y)) { an = moving ? "walk-side" : "idle-side"; bossVisual.flipX = cd.x < 0; }
                else if (cd.y < 0) an = moving ? "walk-up" : "idle-up";
                else an = moving ? "walk-down" : "idle-down";
                if (bossVisual.animName !== an) { bossVisual.play(an); bossVisual.animName = an; }
            }
        }
    });

    // ── Player update (boss scene) ──
    function respawnPlayer() {
        player.pos = worldPos(1, 1);
        player.passThroughBomb = null;
        player.facing = "down";
        updateActorVisual(player, false);
    }

    function playerHit() {
        if (isPaused || isInvincible || runEnded) return;
        bossLives -= 1;
        updateHearts();
        playSfx("playerHitSfx");
        if (bossLives <= 0) {
            runEnded = true;
            playSfx("failureSfx");
            const overlay = add([rect(width(),height()), pos(0,0), color(0,0,0), opacity(0.68), fixed(), z(149), "resultUI"]);
            add([sprite("controlsPanel"), pos(width()/2,height()/2), anchor("center"), fixed(), z(150), "resultUI"]);
            add([text("OPERACAO FALHOU", { size: 20 }), pos(width()/2,height()/2-64), anchor("center"), color(219,76,98), fixed(), z(151), "resultUI"]);
            add([text("Escolha sua proxima acao", { size: 10 }), pos(width()/2,height()/2-44), anchor("center"), color(196,173,186), fixed(), z(151), "resultUI"]);
            resultOptions = [
                { label: "Tentar de novo", action: () => { go("boss"); } },
                { label: "Tela inicial",   action: () => { currentPhase = 1; carryOverStats = null; go("menu"); } },
            ];
            resultSelection = 0;
            resultOptions.forEach((opt, i) => {
                const y = height()/2 + 14 + i * 28;
                const btn = add([sprite(i===0?"menuButtonActive":"menuButton"), pos(width()/2,y), anchor("center"), fixed(), z(151), "resultUI"]);
                const lbl = add([text(opt.label, { size: 10 }), pos(width()/2,y+1), anchor("center"), color(i===0?240:196,i===0?244:173,i===0?236:186), fixed(), z(152), "resultUI"]);
                resultButtons.push(btn); resultLabels.push(lbl);
            });
            return;
        }
        isInvincible = true;
        setActorHidden(player, true);
        showToast("Mordida!", [219, 76, 98]);
        wait(0.7, () => {
            respawnPlayer(); setActorHidden(player, false);
            let flashes = 0;
            const blink = setInterval(() => {
                setActorHidden(player, !player.isHidden); flashes++;
                if (flashes >= 10) { clearInterval(blink); setActorHidden(player, false); isInvincible = false; }
            }, 100);
        });
    }

    player.onCollide("boss", () => playerHit());
    player.onCollide("minion", () => playerHit());

    player.onCollide("powerup", (powerup) => {
        if (powerup.powerType === POWER_BOMB) { maxBombs += 1; showToast("+ Carga", [239,215,159]); }
        else { firePower += 1; showToast("+ Alcance", [255,168,87]); }
        updateStats();
        playSfx("pickupSfx");
        destroy(powerup);
    });

    onUpdate(() => {
        vNavTimer -= dt();
        if (isSlotPickerOpen) {
            if (vNavTimer <= 0) {
                if (vKeys.up)   { _pickerMove(-1); vNavTimer = 0.22; }
                if (vKeys.down) { _pickerMove(1);  vNavTimer = 0.22; }
            }
            if (virtualBombPressed)  { virtualBombPressed  = false; _pickerConfirm(); }
            if (virtualPausePressed) { virtualPausePressed = false; playSfx("uiBack"); _pickerClose(); }
            return;
        }
        if (virtualPausePressed) { virtualPausePressed = false; toggleBossPause(); }

        if (isPaused) {
            if (vNavTimer <= 0) {
                if (vKeys.up)   { pauseSelection=(pauseSelection-1+bossPauseOptions.length)%bossPauseOptions.length; playSfx("uiMove"); refreshBossPause(); vNavTimer=0.22; }
                if (vKeys.down) { pauseSelection=(pauseSelection+1)%bossPauseOptions.length; playSfx("uiMove"); refreshBossPause(); vNavTimer=0.22; }
            }
            if (virtualBombPressed) { virtualBombPressed=false; runBossPauseSelection(); }
            return;
        }

        if (runEnded) {
            if (resultOptions.length > 0 && vNavTimer <= 0) {
                if (vKeys.up)   { resultSelection=(resultSelection-1+resultOptions.length)%resultOptions.length; playSfx("uiMove"); refreshBossResult(); vNavTimer=0.22; }
                if (vKeys.down) { resultSelection=(resultSelection+1)%resultOptions.length; playSfx("uiMove"); refreshBossResult(); vNavTimer=0.22; }
            }
            if (virtualBombPressed && resultOptions.length>0) { virtualBombPressed=false; playSfx("uiConfirm"); resultOptions[resultSelection].action(); }
            return;
        }

        if (player.passThroughBomb) {
            if (!player.passThroughBomb.exists()) { player.passThroughBomb = null; }
            else {
                const cg = gridFromPos(player.pos);
                if (cg.x !== player.passThroughBomb.gridX || cg.y !== player.passThroughBomb.gridY) player.passThroughBomb = null;
            }
        }

        let dirX = 0, dirY = 0;
        if      (isKeyDown("left")  || isKeyDown("a") || vKeys.left)  dirX = -1;
        else if (isKeyDown("right") || isKeyDown("d") || vKeys.right) dirX =  1;
        else if (isKeyDown("up")    || isKeyDown("w") || vKeys.up)    dirY = -1;
        else if (isKeyDown("down")  || isKeyDown("s") || vKeys.down)  dirY =  1;

        let isMoving = false;
        if (dirX !== 0 || dirY !== 0) {
            if (dirX < 0) player.facing = "left";
            else if (dirX > 0) player.facing = "right";
            else if (dirY < 0) player.facing = "up";
            else player.facing = "down";

            const cg = gridFromPos(player.pos);
            const nx = cg.x + dirX, ny = cg.y + dirY;
            const bOnNext = tileHasBomb(nx, ny);
            if (!bOnNext || player.passThroughBomb === bOnNext) {
                player.move(dirX * player.speed, dirY * player.speed);
                isMoving = true;
            }
        }
        updateActorVisual(player, isMoving);
        if (virtualBombPressed) { virtualBombPressed = false; placeBomb(); }
    });

    // ── Pause (boss scene) ──
    const bossPauseOptions = [
        { label: "Voltar para a rua", action: () => closeBossPause() },
        { label: "Salvar jogo", action: () => {
            openSlotPicker("save", (slot) => {
                activeSlot = slot;
                saveProgress(currentPhase, bossLives, maxBombs, firePower);
                showToast("Jogo salvo!", [100, 220, 140]);
                closeBossPause();
            });
        }},
        { label: "Tela inicial", action: () => { currentPhase = 1; carryOverStats = null; go("menu"); } },
    ];

    function refreshBossPause() {
        pauseButtons.forEach((btn, i) => {
            btn.use(sprite(i===pauseSelection?"menuButtonActive":"menuButton"));
            pauseLabels[i].color = i===pauseSelection ? rgb(240,244,236) : rgb(196,173,186);
        });
    }
    function refreshBossResult() {
        resultButtons.forEach((btn, i) => {
            btn.use(sprite(i===resultSelection?"menuButtonActive":"menuButton"));
            resultLabels[i].color = i===resultSelection ? rgb(240,244,236) : rgb(196,173,186);
        });
    }
    function closeBossPause() {
        isPaused = false;
        get("pauseUI").forEach(o => destroy(o));
        pauseButtons = []; pauseLabels = [];
    }
    function runBossPauseSelection() { playSfx("uiConfirm"); bossPauseOptions[pauseSelection].action(); }
    function openBossPause() {
        isPaused = true;
        get("pauseUI").forEach(o => destroy(o));
        pauseButtons = []; pauseLabels = [];
        const cx = width() / 2, cy = height() / 2;
        add([rect(width(), height()), pos(0, 0), color(0, 0, 0), opacity(0.62), fixed(), z(130), "pauseUI"]);
        add([sprite("pausePanel"), pos(cx, cy), anchor("center"), fixed(), z(131), "pauseUI"]);
        add([text("OPERACAO PAUSADA", { size: 16 }), pos(cx, cy - 80), anchor("center"), color(236, 208, 122), fixed(), z(132), "pauseUI"]);
        pauseSelection = 0;
        bossPauseOptions.forEach((opt, i) => {
            const y = cy - 32 + i * 32;
            const btn = add([sprite(i === 0 ? "menuButtonActive" : "menuButton"), pos(cx, y), anchor("center"), fixed(), z(132), "pauseUI"]);
            const lbl = add([text(opt.label, { size: 12 }), pos(cx, y + 1), anchor("center"), color(i === 0 ? 240 : 196, i === 0 ? 244 : 173, i === 0 ? 236 : 186), fixed(), z(133), "pauseUI"]);
            pauseButtons.push(btn); pauseLabels.push(lbl);
        });
    }
    function toggleBossPause() {
        if (isPaused) { playSfx("pauseToggle"); closeBossPause(); }
        else { playSfx("pauseToggle"); openBossPause(); }
    }

    onKeyPress("space", placeBomb); onKeyPress("z", placeBomb);
    onKeyPress("x",      () => { if (isSlotPickerOpen) { playSfx("uiBack"); _pickerClose(); return; } placeBomb(); });
    onKeyPress("escape", () => { if (isSlotPickerOpen) { playSfx("uiBack"); _pickerClose(); return; } toggleBossPause(); });
    onKeyPress("p",      () => { if (isSlotPickerOpen) { playSfx("uiBack"); _pickerClose(); return; } toggleBossPause(); });
    onKeyPress("t", toggleMute);
    onKeyPress("up", () => {
        if (isSlotPickerOpen) { _pickerMove(-1); return; }
        if (isPaused) { pauseSelection=(pauseSelection-1+bossPauseOptions.length)%bossPauseOptions.length; playSfx("uiMove"); refreshBossPause(); return; }
        if (runEnded && resultOptions.length>0) { resultSelection=(resultSelection-1+resultOptions.length)%resultOptions.length; playSfx("uiMove"); refreshBossResult(); }
    });
    onKeyPress("down", () => {
        if (isSlotPickerOpen) { _pickerMove(1); return; }
        if (isPaused) { pauseSelection=(pauseSelection+1)%bossPauseOptions.length; playSfx("uiMove"); refreshBossPause(); return; }
        if (runEnded && resultOptions.length>0) { resultSelection=(resultSelection+1)%resultOptions.length; playSfx("uiMove"); refreshBossResult(); }
    });
    onKeyPress("enter", () => {
        if (isSlotPickerOpen) { _pickerConfirm(); return; }
        if (isPaused) { runBossPauseSelection(); return; }
        if (runEnded && resultOptions.length>0) { playSfx("uiConfirm"); resultOptions[resultSelection].action(); }
    });

    updateHearts();
    updateStats();
    updateBossHpBar();
});

// ── Ending Cutscene ────────────────────────────────────────────────
scene("ending", () => {
    setSceneAudio({ music: { name: "menuTheme", volume: 0.22 }, ambience: null });

    const cx = width() / 2;
    const cy = height() / 2;
    const diffLabel = DIFFICULTIES[selectedDifficulty]?.label ?? "MEDIO";
    const timeStr = (() => {
        const s = Math.floor(campaignElapsedMs / 1000);
        return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
    })();

    // ── Typewriter helper ──
    function typewrite(obj, str, charInterval) {
        let i = 0; let acc = 0;
        const h = onUpdate(() => {
            acc += dt();
            const newI = Math.min(str.length, Math.floor(acc / charInterval));
            if (newI !== i) { i = newI; obj.text = str.slice(0, i); }
            if (i >= str.length) h.cancel();
        });
    }

    // Shared layers (persist across slides)
    const bg = add([rect(width(), height()), pos(0, 0), color(0, 0, 0), z(1)]);
    let slideObjs = [];
    function clearSlide() { slideObjs.forEach(o => { if (o.exists()) destroy(o); }); slideObjs = []; }

    // ── Slide sequence ──

    // Slide 1 – black, typewriter intro
    wait(0.8, () => {
        const t = add([text("", { size: 12, width: 240, align: "center" }), pos(cx, cy), anchor("center"), color(200, 200, 200), z(10)]);
        slideObjs.push(t);
        typewrite(t, "A ultima bomba detonou...", 0.055);
    });

    // Slide 2 – zombie falls
    wait(3.0, () => {
        clearSlide();
        const zSprite = add([sprite("zombieAnim", { anim: "walk-down" }), pos(cx + 40, cy + 20), anchor("center"), scale(2.5), color(120, 40, 40), z(5)]);
        slideObjs.push(zSprite);
        let fadeT = 0;
        const fadeH = onUpdate(() => { fadeT += dt(); zSprite.opacity = Math.max(0, 1 - fadeT * 0.55); if (zSprite.opacity <= 0) fadeH.cancel(); });
        slideObjs.push({ exists: () => true, destroy: () => fadeH.cancel() });
        const t = add([text("", { size: 12, width: 240, align: "center" }), pos(cx, cy - 50), anchor("center"), color(200, 200, 200), z(10)]);
        slideObjs.push(t);
        typewrite(t, "Os mortos-vivos foram silenciados...", 0.048);
    });

    // Slide 3 – survivor stands, dark blue bg
    wait(5.8, () => {
        clearSlide();
        bg.color = rgb(18, 28, 52);
        const pSprite = add([sprite("playerAnim", { anim: "idle-down" }), pos(cx, cy + 10), anchor("center"), scale(2.8), z(5)]);
        slideObjs.push(pSprite);
        const t = add([text("", { size: 12, width: 240, align: "center" }), pos(cx, cy - 58), anchor("center"), color(180, 220, 255), z(10)]);
        slideObjs.push(t);
        typewrite(t, "O sobrevivente ficou de pe.", 0.055);
    });

    // Slide 4 – sunrise, warm sky
    wait(8.5, () => {
        clearSlide();
        bg.color = rgb(200, 100, 30);
        const sky = add([rect(width(), height() / 2), pos(0, 0), color(240, 160, 50), z(2)]);
        const ground = add([rect(width(), height() / 2), pos(0, height() / 2), color(60, 80, 40), z(2)]);
        slideObjs.push(sky, ground);
        const pSprite = add([sprite("playerAnim", { anim: "idle-down" }), pos(cx, cy + 10), anchor("center"), scale(2.8), z(5)]);
        slideObjs.push(pSprite);
        const t = add([text("", { size: 12, width: 240, align: "center" }), pos(cx, cy - 58), anchor("center"), color(255, 240, 180), z(10)]);
        slideObjs.push(t);
        typewrite(t, "A cidade pode respirar novamente.", 0.050);
    });

    // Slide 5 – golden bg, big title
    wait(11.5, () => {
        clearSlide();
        bg.color = rgb(220, 170, 40);
        const t1 = add([text("MISSAO CONCLUIDA", { size: 22 }), pos(cx, cy - 40), anchor("center"), color(255, 255, 180), z(10)]);
        const t2 = add([text(`Dificuldade: ${diffLabel}`, { size: 11 }), pos(cx, cy + 8), anchor("center"), color(80, 40, 0), z(10)]);
        const t3 = add([text(`Tempo: ${timeStr}`, { size: 11 }), pos(cx, cy + 26), anchor("center"), color(80, 40, 0), z(10)]);
        slideObjs.push(t1, t2, t3);
    });

    // Slide 6 – prompt to continue
    let readyToContinue = false;
    wait(14.0, () => {
        readyToContinue = true;
        const prompt = add([text("[pressione qualquer tecla]", { size: 9 }), pos(cx, cy + 64), anchor("center"), color(255, 255, 200), z(10)]);
        slideObjs.push(prompt);
        let t = 0;
        onUpdate(() => { t += dt(); prompt.opacity = 0.4 + 0.6 * Math.abs(Math.sin(t * 3)); });
    });

    // Auto-advance after 20s
    wait(20.0, () => { currentPhase = 1; carryOverStats = null; go("menu"); });

    const _endingGo = () => { if (readyToContinue) { currentPhase = 1; carryOverStats = null; go("menu"); } };
    ["enter", "space", "escape", "z", "x"].forEach(k => onKeyPress(k, _endingGo));
});

go("menu");
    </script>
</body>
</html>
