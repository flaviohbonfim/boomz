<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoomZ!</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #5a645c 0%, #252c28 48%, #101412 100%);
            font-family: "Trebuchet MS", "Arial Narrow", sans-serif;
            padding: 24px;
        }

        @media (pointer: coarse) {
            body {
                padding: 0;
                align-items: stretch;
                justify-content: stretch;
                overflow: hidden;
                height: 100dvh;
            }
        }

        canvas {
            image-rendering: pixelated;
            display: block;
        }

        /* ════════════════════════════════
           CONSOLE FRAME
        ════════════════════════════════ */
        #console-frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(172deg, #2e3b34 0%, #1c2720 32%, #101710 100%);
            border-radius: 22px 22px 56px 56px;
            padding: 18px 22px 0 22px;
            box-shadow:
                0 0 0 1px #07100d,
                0 0 0 3px #36443c,
                0 0 0 5px #111a15,
                0 60px 140px rgba(0, 0, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 2px 8px rgba(255, 255, 255, 0.02);
        }

        @media (pointer: coarse) {
            #console-frame {
                width: 100%;
                height: 100dvh;
                border-radius: 0;
                padding: 10px 12px 0 12px;
            }
        }

        /* ── Console header: speaker grilles + logo ── */
        #console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding-bottom: 14px;
        }

        .speaker-grille {
            display: grid;
            grid-template-columns: repeat(5, 5px);
            grid-template-rows: repeat(2, 5px);
            gap: 3px;
        }

        .speaker-grille span {
            display: block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #111a15;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.9), 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        #console-logo-text {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #cf9a3c;
            text-shadow: 0 0 12px rgba(207, 154, 60, 0.4);
            text-transform: uppercase;
        }

        /* ── Screen bezel ── */
        #screen-bezel {
            background: #060e0b;
            border-radius: 8px;
            padding: 12px;
            box-shadow:
                inset 0 4px 14px rgba(0, 0, 0, 0.98),
                inset 0 0 0 1px rgba(0, 0, 0, 0.65),
                0 0 0 1px #1c2820;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (pointer: coarse) {
            #screen-bezel {
                width: 100%;
                flex: 1;
                padding: 8px;
                min-height: 0;
            }
        }

        /* ── Virtual controls (hidden on desktop) ── */
        #virtual-controls { display: none; }

        @media (pointer: coarse) {
            #virtual-controls {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                padding: 12px 20px;
                min-height: 155px;
                flex-shrink: 0;
                touch-action: none;
            }
        }

        /* ── D-pad ── */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 52px);
            grid-template-rows: repeat(3, 52px);
            gap: 4px;
        }

        .dpad-btn {
            background: rgba(63, 71, 66, 0.85);
            border: 2px solid #5a645c;
            border-radius: 8px;
            color: #c8d4cc;
            font-size: 20px;
            cursor: pointer;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            padding: 0;
        }

        .dpad-btn:active, .dpad-btn.pressed {
            background: rgba(207, 154, 60, 0.5);
            border-color: #cf9a3c;
        }

        .dpad-center {
            background: rgba(20, 28, 22, 0.7);
            border-radius: 50%;
        }

        /* ── Action buttons ── */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .action-btn {
            background: rgba(180, 40, 40, 0.85);
            border: 2px solid #c04040;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            cursor: pointer;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .btn-y {
            background: rgba(34, 110, 72, 0.85);
            border-color: #3a8a58;
        }

        .action-btn:active { filter: brightness(1.4); }

        /* ── Console footer strip ── */
        #console-footer {
            width: 100%;
            height: 22px;
            margin-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.035);
            border-radius: 0 0 56px 56px;
            background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.35));
            flex-shrink: 0;
        }

        @media (pointer: coarse) {
            #console-footer {
                height: 14px;
                margin-top: 0;
                border-radius: 0;
            }
        }
    </style>
</head>

    <script type="module">
import kaboom from "https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs";

// ── Mobile detection & scale ──
const isMobile = ('ontouchstart' in window) || window.matchMedia('(pointer: coarse)').matches;
const vKeys = { left: false, right: false, up: false, down: false };
let virtualBombPressed = false;
let virtualPausePressed = false;
let gameScale = 2.5;
if (isMobile) {
    // vertical: frame-pad(10) + header(44) + header-pb(14) + bezel-pad(16) + controls(155) + footer(14)
    const VERTICAL_OVERHEAD = 253;
    // horizontal: frame-pad(24) + bezel-pad(16)
    const HORIZONTAL_OVERHEAD = 40;
    const scaleW = (window.innerWidth - HORIZONTAL_OVERHEAD) / 304;
    const scaleH = (window.innerHeight - VERTICAL_OVERHEAD) / 280;
    gameScale = Math.min(scaleW, scaleH, 2.5);
}

if (location.protocol === "file:") {
    document.body.innerHTML = `
        <main style="max-width:720px;padding:32px 28px;border:4px solid #3f4742;box-shadow:0 24px 60px rgba(0,0,0,.65),0 0 40px rgba(207,154,60,.18);background:linear-gradient(180deg,#232a26 0%,#141816 100%);color:#f0d59c;line-height:1.5;">
            <h1 style="font-size:32px;margin-bottom:12px;">BoomZ!</h1>
            <p style="margin-bottom:12px;color:#c9d0cb;">Agora os sprites estao em arquivos separados dentro de <code>assets/</code>. Navegadores bloqueiam esse carregamento quando o jogo e aberto por <code>file://</code>.</p>
            <p style="margin-bottom:12px;color:#c9d0cb;">Para rodar corretamente:</p>
            <ol style="padding-left:22px;margin-bottom:14px;color:#f0d59c;">
                <li>Execute <code>start-local-server.bat</code></li>
                <li>Abra <code>http://localhost:8080</code></li>
            </ol>
            <p style="color:#95a19a;">Se preferir, voce tambem pode usar qualquer servidor HTTP local.</p>
        </main>
    `;
    await new Promise(() => {});
}

kaboom({
    width: 304,
    height: 280,
    scale: gameScale,
    crisp: true,
    background: [16, 20, 18],
});

// Move canvas into the screen bezel
document.getElementById('screen-bezel').appendChild(document.querySelector('canvas'));

// ── Virtual controls wiring (flags only — no synthetic keyboard events) ──
{
    const dpadDirs = [
        { id: 'btn-up',    dir: 'up'    },
        { id: 'btn-down',  dir: 'down'  },
        { id: 'btn-left',  dir: 'left'  },
        { id: 'btn-right', dir: 'right' },
    ];
    for (const { id, dir } of dpadDirs) {
        const el = document.getElementById(id);
        el.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            el.setPointerCapture(e.pointerId);
            vKeys[dir] = true;
        });
        const release = () => { vKeys[dir] = false; };
        el.addEventListener('pointerup',     release);
        el.addEventListener('pointercancel', release);
        el.addEventListener('pointerleave',  release);
    }

    // X = bomb (game) / confirm (menu) — both handled via virtualBombPressed flag
    document.getElementById('btn-x').addEventListener('pointerdown', (e) => {
        e.preventDefault();
        virtualBombPressed = true;
    });

    // Y = pause (game) / back (menus) — handled via virtualPausePressed flag
    document.getElementById('btn-y').addEventListener('pointerdown', (e) => {
        e.preventDefault();
        virtualPausePressed = true;
    });

    // Prevent page scroll while touching the controls
    document.getElementById('virtual-controls').addEventListener('touchmove', (e) => {
        e.preventDefault();
    }, { passive: false });
}

let activeSlot = 1;
function saveSlot(slot, phase, lives, maxBombs, firePower, destroyedTiles, enemiesDefeated) {
    try { localStorage.setItem(`boomz_save_${slot}`, JSON.stringify({ phase, lives, maxBombs, firePower, difficulty: selectedDifficulty, ts: Date.now(), destroyedTiles, enemiesDefeated })); } catch {}
}
function loadSlot(slot) {
    try { const r = localStorage.getItem(`boomz_save_${slot}`); return r ? JSON.parse(r) : null; } catch { return null; }
}
function clearSlot(slot) {
    try { localStorage.removeItem(`boomz_save_${slot}`); } catch {}
}
function getAllSlots() { return [1, 2, 3].map(i => loadSlot(i)); }
function saveProgress(phase, lives, maxBombs, firePower, destroyedTiles, enemiesDefeated) { saveSlot(activeSlot, phase, lives, maxBombs, firePower, destroyedTiles, enemiesDefeated); }
function loadProgress() { return loadSlot(activeSlot); }
function clearProgress() { clearSlot(activeSlot); }
function collectDestroyedTiles() {
    const tiles = [];
    for (let y = 0; y < MAP_HEIGHT; y++)
        for (let x = 0; x < MAP_WIDTH; x++)
            if (gameMap[y] && gameMap[y][x] === EMPTY) tiles.push(`${x},${y}`);
    return tiles;
}
function applyDestroyedTiles(tiles) {
    if (!tiles) return;
    const tileSet = new Set(tiles);
    for (let y = 0; y < MAP_HEIGHT; y++)
        for (let x = 0; x < MAP_WIDTH; x++)
            if (gameMap[y][x] === DESTRUCTIBLE && tileSet.has(`${x},${y}`)) gameMap[y][x] = EMPTY;
}

// ── Slot picker state (driven by scene handlers, no dynamic onKeyPress) ──
let _picker = null;

function openSlotPicker(mode, onSelect) {
    const slots = getAllSlots();
    if (mode === "load" && slots.every(s => s === null)) return;

    const sel0 = mode === "load" ? Math.max(0, slots.findIndex(s => s !== null)) : 0;
    const cx = width() / 2, cy = height() / 2;

    function labelLine1(i) {
        const d = slots[i];
        if (!d) return `SLOT ${i + 1}   -   VAZIO`;
        return `SLOT ${i + 1}   Fase ${d.phase}   ${DIFFICULTIES[d.difficulty]?.label ?? "MEDIO"}`;
    }
    function labelLine2(i) {
        const d = slots[i];
        if (!d) return "";
        return new Date(d.ts).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    // Background panel (drawn rects, no sprite)
    add([rect(width(), height()), pos(0, 0), color(0, 0, 0), opacity(0.78), fixed(), z(145), "slotPickerUI"]);
    add([rect(260, 190), pos(cx, cy), anchor("center"), color(15, 19, 17), fixed(), z(145), "slotPickerUI"]);
    add([rect(256, 186), pos(cx, cy), anchor("center"), color(27, 33, 30), fixed(), z(146), "slotPickerUI"]);
    add([rect(256, 8), pos(cx, cy - 87), anchor("center"), color(207, 154, 60), fixed(), z(146), "slotPickerUI"]);
    add([text(mode === "save" ? "SALVAR JOGO" : "CARREGAR JOGO", { size: 13 }), pos(cx, cy - 69), anchor("center"), color(236, 208, 122), fixed(), z(147), "slotPickerUI"]);
    add([text("setas + Enter  /  ESC para fechar", { size: 7 }), pos(cx, cy - 49), anchor("center"), color(140, 155, 148), fixed(), z(147), "slotPickerUI"]);

    // Slot rows: center positions
    const rowYs = [cy - 16, cy + 28, cy + 72];
    const borders = [], fills = [], line1s = [], line2s = [];
    for (let i = 0; i < 3; i++) {
        const y = rowYs[i];
        const inactive = mode === "load" && slots[i] === null;
        borders.push(add([rect(242, 38), pos(cx, y), anchor("center"), color(72, 84, 78), fixed(), z(147), "slotPickerUI"]));
        fills.push(add([rect(240, 36), pos(cx, y), anchor("center"), color(inactive ? 20 : 28, inactive ? 26 : 36, inactive ? 22 : 31), fixed(), z(148), "slotPickerUI"]));
        line1s.push(add([text(labelLine1(i), { size: 9 }), pos(cx, y - 6), anchor("center"), color(inactive ? 60 : 196, inactive ? 70 : 190, inactive ? 66 : 180), fixed(), z(149), "slotPickerUI"]));
        line2s.push(add([text(labelLine2(i), { size: 8 }), pos(cx, y + 6), anchor("center"), color(inactive ? 40 : 140, inactive ? 50 : 152, inactive ? 46 : 148), fixed(), z(149), "slotPickerUI"]));
    }

    function refresh(sel) {
        for (let i = 0; i < 3; i++) {
            const inactive = mode === "load" && slots[i] === null;
            const isSelected = i === sel && !inactive;
            borders[i].color = isSelected ? rgb(207, 154, 60) : inactive ? rgb(30, 38, 34) : rgb(72, 84, 78);
            fills[i].color   = isSelected ? rgb(40, 54, 46)   : inactive ? rgb(20, 26, 22)  : rgb(28, 36, 31);
            line1s[i].color  = inactive ? rgb(60, 70, 66) : isSelected ? rgb(240, 240, 230) : rgb(196, 190, 180);
            line2s[i].color  = inactive ? rgb(40, 50, 46) : isSelected ? rgb(200, 210, 200) : rgb(140, 152, 148);
        }
    }

    _picker = { mode, slots, sel: sel0, onSelect, refresh,
        nextValid(dir) {
            let n = this.sel;
            for (let t = 0; t < 3; t++) {
                n = (n + dir + 3) % 3;
                if (this.mode !== "load" || this.slots[n] !== null) return n;
            }
            return this.sel;
        }
    };
    refresh(sel0);
    isSlotPickerOpen = true;
}

function _pickerMove(dir) {
    if (!_picker) return;
    _picker.sel = _picker.nextValid(dir);
    playSfx("uiMove");
    _picker.refresh(_picker.sel);
}
function _pickerConfirm() {
    if (!_picker) return;
    if (_picker.mode === "load" && _picker.slots[_picker.sel] === null) return;
    playSfx("uiConfirm");
    const sel = _picker.sel, data = _picker.slots[sel], cb = _picker.onSelect;
    _pickerClose();
    cb(sel + 1, data);
}
function _pickerClose() {
    if (!_picker) return;
    isSlotPickerOpen = false;
    _picker = null;
    get("slotPickerUI").forEach(o => destroy(o));
}

    "horizontal-end-right": { from: 9, to: 11, speed: 14, loop: false },
    "vertical-end-down": { from: 12, to: 14, speed: 14, loop: false },
};

let gameMap = [];

function worldPos(gx, gy) {
    return vec2(gx * TILE_SIZE + TILE_SIZE / 2, gy * TILE_SIZE + TILE_SIZE / 2 + MAP_OFFSET_Y);
}

function gridFromPos(pos) {
    return {
        x: Math.round((pos.x - TILE_SIZE / 2) / TILE_SIZE),
        y: Math.round((pos.y - MAP_OFFSET_Y - TILE_SIZE / 2) / TILE_SIZE),
    };
}

function inBounds(gx, gy) {
    return gx >= 0 && gx < MAP_WIDTH && gy >= 0 && gy < MAP_HEIGHT;
}

function isEdgeCorridor(gx, gy) {
    return gx === 1 || gy === 1 || gx === MAP_WIDTH - 2 || gy === MAP_HEIGHT - 2;
}

function actorDepth(posY) {
    return 20 + (posY - MAP_OFFSET_Y) / TILE_SIZE;
}

function stopAudioHandle(handle) {
    if (!handle) return;
    try {
        handle.stop();
    } catch {}
}

function cleanupAudioBindings() {
    for (let i = audioStatusBindings.length - 1; i >= 0; i--) {
        const binding = audioStatusBindings[i];
        if (!binding.label.exists || !binding.label.exists()) {
            audioStatusBindings.splice(i, 1);
        }
    }
}

function updateAudioLabels() {
    cleanupAudioBindings();
    audioStatusBindings.forEach((binding) => {
        binding.label.text = binding.formatter(audioMuted);
        if (binding.colorize) binding.colorize(binding.label, audioMuted);
    });
}

function bindAudioLabel(label, formatter, colorize) {
    audioStatusBindings.push({ label, formatter, colorize });
    updateAudioLabels();
}

function applySceneAudio() {
    stopAudioHandle(currentMusicHandle);
    stopAudioHandle(currentAmbienceHandle);
    currentMusicHandle = null;
    currentAmbienceHandle = null;

    if (!audioPrimed || audioMuted) {
        updateAudioLabels();
        return;
    }

    try {
        if (currentSceneAudio.music) {
            currentMusicHandle = play(currentSceneAudio.music.name, {
                loop: true,
                volume: currentSceneAudio.music.volume,
                speed:  currentSceneAudio.music.speed  ?? 1.0,
                detune: currentSceneAudio.music.detune ?? 0,
            });
        }
        if (currentSceneAudio.ambience) {
            currentAmbienceHandle = play(currentSceneAudio.ambience.name, {
                loop: true,
                volume: currentSceneAudio.ambience.volume,
                speed:  currentSceneAudio.ambience.speed  ?? 1.0,
                detune: currentSceneAudio.ambience.detune ?? 0,
            });
        }
    } catch {}

    updateAudioLabels();
}

function setSceneAudio(config) {
    currentSceneAudio = config;
    applySceneAudio();
}

function primeAudio() {
    if (audioPrimed) return;
    audioPrimed = true;
    applySceneAudio();
}

function toggleMute() {
    audioMuted = !audioMuted;
    if (!audioMuted && !audioPrimed) {
        audioPrimed = true;
    }
    applySceneAudio();
    if (!audioMuted) {
        try {
            play("uiConfirm", { volume: 0.22 });
        } catch {}
    }
}

function playSfx(name, options = {}) {
    primeAudio();
    if (audioMuted) return null;
    try {
        return play(name, { ...(SFX_DEFAULTS[name] || {}), ...options });
    } catch {
        return null;
    }
}

function generateMap() {
    gameMap = [];
    for (let y = 0; y < MAP_HEIGHT; y++) {
        gameMap[y] = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (x === 0 || y === 0 || x === MAP_WIDTH - 1 || y === MAP_HEIGHT - 1) {
                gameMap[y][x] = SOLID;
            } else if (isEdgeCorridor(x, y)) {
                gameMap[y][x] = EMPTY;
            } else if (x % 2 === 0 && y % 2 === 0) {
                gameMap[y][x] = SOLID;
            } else {
                gameMap[y][x] = EMPTY;
            }
        }
    }

    const safeZone = new Set(["1,1", "2,1", "1,2", "3,1", "1,3", "2,2"]);
    let seed = currentPhase * 100003;
    function seededRandom() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }
    for (let y = 1; y < MAP_HEIGHT - 1; y++) {
        for (let x = 1; x < MAP_WIDTH - 1; x++) {
            if (
                gameMap[y][x] === EMPTY
                && !safeZone.has(`${x},${y}`)
                && !isEdgeCorridor(x, y)
                && seededRandom() < DIFFICULTIES[selectedDifficulty].boxDensity
            ) {
                gameMap[y][x] = DESTRUCTIBLE;
            }
        }
    }
}

        options.push({ label: () => `DIFICULDADE: ${DIFFICULTIES[selectedDifficulty].label}`, isDiffToggle: true, col: 1, row: 1 });

    const MAX_ROW = options.reduce((m, o) => Math.max(m, o.row), 0);
    const ROW_Y0 = 148;
    const ROW_Y1 = 180;
    const ROW_Y2 = 210;
    const COL_LEFT = 88;
    const COL_RIGHT = 216;
    const COL_CENTER = width() / 2;

    let selected = 0;
    const buttons = [];
    const labels = [];
    const soundIcons = [];

        if (opt.row === 1) return vec2(opt.col === 0 ? COL_LEFT : COL_RIGHT, ROW_Y1);

    }

    options.forEach((option, index) => {
        const p = getButtonPos(option);
        const isHero = option.isNewGame;
        const isSound = option.isSoundToggle;
        const btnSprite = isHero

            : (index === selected ? "menuButtonSmActive" : "menuButtonSm");

        const labelText = typeof option.label === 'function' ? option.label() : option.label;
        const label = add([
            text(labelText, { size: isHero ? 11 : 9 }),
            pos(p.x + (isSound ? 8 : 0), p.y + 1),
            anchor("center"),
            color(index === selected ? 240 : 196, index === selected ? 244 : 173, index === selected ? 236 : 186),
        ]);
        let soundIcon = null;
        if (isSound) {
            soundIcon = add([
                sprite(audioMuted ? "soundOff" : "soundOn"),
                pos(p.x - 42, p.y),
                anchor("center"),
                scale(0.75),
                color(index === selected ? 240 : 160, index === selected ? 244 : 170, index === selected ? 236 : 166),
            ]);
        }
        buttons.push(button);
        labels.push(label);
        soundIcons.push(soundIcon);
    });

    const leftBat = add([sprite("selectorBat"), pos(0, 0), anchor("center")]);
    const rightBat = add([sprite("selectorBat"), pos(0, 0), anchor("center"), scale(vec2(-1, 1))]);

    function refreshMenu() {
        buttons.forEach((button, index) => {
            const opt = options[index];
            const isHero = opt.isNewGame;
            const isSound = opt.isSoundToggle;
            const btnSprite = isHero
                ? (index === selected ? "menuButtonActive" : "menuButton")
                : (index === selected ? "menuButtonSmActive" : "menuButtonSm");
            button.use(sprite(btnSprite));
            labels[index].color = index === selected ? rgb(240, 244, 236) : rgb(196, 173, 186);
            labels[index].text = typeof opt.label === 'function' ? opt.label() : opt.label;
            const p = getButtonPos(opt);
            button.pos = p;
            labels[index].pos = vec2(p.x + (isSound ? 8 : 0), p.y + 1);
            if (soundIcons[index]) {
                soundIcons[index].use(sprite(audioMuted ? "soundOff" : "soundOn"));
                soundIcons[index].color = index === selected ? rgb(240, 244, 236) : rgb(160, 170, 166);
                soundIcons[index].pos = vec2(p.x - 42, p.y);
            }
        });
        const sp = getButtonPos(options[selected]);
        const halfW = options[selected].isNewGame ? 88 : 72;
        leftBat.pos = vec2(sp.x - halfW, sp.y);
        rightBat.pos = vec2(sp.x + halfW, sp.y);
    }

    refreshMenu();

    onUpdate(() => {
        const pulse = 1 + Math.sin(time() * 8) * 0.08;
        leftBat.scale = vec2(pulse, pulse);
        rightBat.scale = vec2(-pulse, pulse);

        chaseTimer += dt();
        if (chaseTimer >= chaseCycleDuration) {
            configureChase(chaseIndex + 1);
        }

        if (chaseTimer <= chaseDuration) {
            const pattern = chasePatterns[chaseIndex];
            const progress = chaseTimer / chaseDuration;
            const direction = pattern.direction;
            const laneStart = direction === 1 ? -34 : width() + 34;
            const laneEnd = direction === 1 ? width() + 34 : -34;
            const leadX = laneStart + (laneEnd - laneStart) * progress;
            const gap = 28 - Math.sin(progress * Math.PI) * 10;
            const chaseX = leadX - direction * gap;

            const leaderSprite = pattern.leader === "player" ? menuPlayer : menuZombie;
            const chaserSprite = pattern.chaser === "player" ? menuPlayer : menuZombie;

            leaderSprite.hidden = false;
            chaserSprite.hidden = false;

            leaderSprite.pos = vec2(leadX, 124 + Math.sin(time() * 12.5) * 1.2);
            chaserSprite.pos = vec2(chaseX, 127 + Math.sin(time() * 12.5 + 0.8) * 1.2);

            chaseDust.forEach((puff, index) => {
                const drift = 10 + index * 7 + Math.sin(time() * 10 + index) * 1.4;
                const sway = 2 + index * 1.4;
                puff.hidden = false;
                puff.pos = vec2(
                    chaserSprite.pos.x - direction * drift,
                    chaserSprite.pos.y + 7 + Math.sin(time() * 8 + index) * sway,
                );
                puff.opacity = 0.18 + index * 0.08 + Math.sin(time() * 12 + index) * 0.04;
                puff.scale = vec2(1 + index * 0.16, 0.85 + index * 0.08);
            });
        } else {
            menuPlayer.hidden = true;
            menuZombie.hidden = true;
            chaseDust.forEach((puff) => {
                puff.hidden = true;
                puff.opacity = 0;
            });
        }
    });

    function findInDirection(fromRow, fromCol, dRow, dCol) {
        let best = -1;
        let bestDist = Infinity;
        for (let i = 0; i < options.length; i++) {
            const o = options[i];
            if (o.row === fromRow + dRow && o.col === fromCol + dCol) {
                best = i;
                bestDist = 0;
                break;
            }
            if (dRow !== 0 && o.row === fromRow + dRow) {
                const dist = Math.abs(o.col - fromCol);
                if (dist < bestDist) { best = i; bestDist = dist; }
            }
            if (dCol !== 0 && o.col !== -1 && o.col !== fromCol) {
                if (o.row === fromRow || (Math.abs(o.row - fromRow) <= 1 && bestDist > 1)) {
                    best = i;
                    bestDist = Math.abs(o.row - fromRow);
                }
            }
        }
        return best >= 0 ? best : selected;
    }

    function menuUp() {
        const cur = options[selected];
        if (cur.row > 0) {
            selected = findInDirection(cur.row, cur.col, -1, 0);
        }
        playSfx("uiMove");
        refreshMenu();
    }
    function menuDown() {
        const cur = options[selected];
        if (cur.row < MAX_ROW) {
            selected = findInDirection(cur.row, cur.col, 1, 0);
        }
        playSfx("uiMove");
        refreshMenu();
    }
    function menuLeft() {
        const cur = options[selected];
        if (cur.col === 1) {
            selected = findInDirection(cur.row, 1, 0, -1);
            if (options[selected].col === cur.col) { selected = findInDirection(cur.row, 1, -1, -1); }
        }
        playSfx("uiMove");
        refreshMenu();
    }
    function menuRight() {
        const cur = options[selected];
        if (cur.col === 0) {
            selected = findInDirection(cur.row, 0, 0, 1);
            if (options[selected].col === cur.col) { selected = findInDirection(cur.row, 0, -1, 1); }

        playSfx("uiMove");
        refreshMenu();
    }
    function menuConfirm() {
        const opt = options[selected];
        if (opt.isSoundToggle) {
            toggleMute();
            refreshMenu();
            return;
        }
        if (opt.isDiffToggle) {
            const order = ["easy", "medium", "hard"];
            selectedDifficulty = order[(order.indexOf(selectedDifficulty) + 1) % order.length];
            playSfx("uiMove");
            refreshMenu();
            return;
        }
        playSfx("uiConfirm");
        if (opt.isLoad) {
            openSlotPicker("load", (slot, data) => {
                activeSlot = slot;
                selectedDifficulty = data.difficulty || "medium";
                currentPhase = data.phase;
                carryOverStats = { lives: data.lives, maxBombs: data.maxBombs, firePower: data.firePower, destroyedTiles: data.destroyedTiles, enemiesDefeated: data.enemiesDefeated };
                go("game");
            });
            return;
        }
        if (opt.isNewGame) {
            currentPhase = 1;
            carryOverStats = null;
            go("game");
            return;
        }
        go(opt.target);
    }

    onKeyPress("up",     () => { if (isSlotPickerOpen) { _pickerMove(-1); return; } menuUp(); });
    onKeyPress("down",   () => { if (isSlotPickerOpen) { _pickerMove(1);  return; } menuDown(); });
    onKeyPress("left",   () => { if (isSlotPickerOpen) { _pickerMove(-1); return; } menuLeft(); });
    onKeyPress("right",  () => { if (isSlotPickerOpen) { _pickerMove(1);  return; } menuRight(); });
    onKeyPress("enter",  () => { if (isSlotPickerOpen) { _pickerConfirm(); return; } menuConfirm(); });
    onKeyPress("escape", () => { if (isSlotPickerOpen) { playSfx("uiBack"); _pickerClose(); return; } });
    onKeyPress("x",      () => { if (isSlotPickerOpen) { playSfx("uiBack"); _pickerClose(); return; } });

    // Virtual controls: D-pad navigates, X confirms, Y ignored
    let vNavTimer = 0;
    onUpdate(() => {
        vNavTimer -= dt();
        if (isSlotPickerOpen) {
            if (vNavTimer <= 0) {
                if (vKeys.up)    { _pickerMove(-1); vNavTimer = 0.22; }
                if (vKeys.down)  { _pickerMove(1);  vNavTimer = 0.22; }
                if (vKeys.left)  { _pickerMove(-1); vNavTimer = 0.22; }
                if (vKeys.right) { _pickerMove(1);  vNavTimer = 0.22; }
            }

            if (virtualPausePressed) { virtualPausePressed = false; playSfx("uiBack"); _pickerClose(); }
            return;
        }
        if (vNavTimer <= 0) {
            if (vKeys.up)    { menuUp();    vNavTimer = 0.22; }
            if (vKeys.down)  { menuDown();  vNavTimer = 0.22; }
            if (vKeys.left)  { menuLeft();  vNavTimer = 0.22; }
            if (vKeys.right) { menuRight(); vNavTimer = 0.22; }
        }
        if (virtualBombPressed)  { virtualBombPressed  = false; menuConfirm(); }
        if (virtualPausePressed) { virtualPausePressed = false; }
