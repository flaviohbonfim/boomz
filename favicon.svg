<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Glow behind spark -->
  <circle cx="23" cy="5" r="5" fill="rgba(255,180,0,0.25)"/>

  <!-- Fuse cord -->
  <path d="M17 11 Q19 8 22 6" stroke="#a07828" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Bomb body shadow -->
  <circle cx="15" cy="22" r="9.5" fill="rgba(0,0,0,0.45)"/>

  <!-- Bomb body -->
  <circle cx="15" cy="21" r="9.5" fill="#111a16"/>
  <circle cx="15" cy="21" r="9.5" fill="none" stroke="#2c3e36" stroke-width="1.2"/>

  <!-- Subtle highlight -->
  <ellipse cx="11" cy="16" rx="3.5" ry="2.5" fill="rgba(255,255,255,0.06)" transform="rotate(-20 11 16)"/>

  <!-- Top stem -->
  <rect x="13.5" y="10" width="3" height="3.5" rx="1" fill="#243028"/>

  <!-- "Z" on body -->
  <text x="15" y="25.5" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="11" font-weight="900"
        fill="#cf9a3c" letter-spacing="-1">Z</text>

  <!-- Spark flame -->
  <circle cx="23" cy="5" r="2.8" fill="#ffd94a"/>
  <circle cx="23" cy="4.2" r="1.6" fill="#fff8c0"/>
</svg>
